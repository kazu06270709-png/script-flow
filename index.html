              const pct = cs.length ? Math.round((cnt["習得"] / cs.length) * 100) : 0;
              return (
                <Card key={ci} onClick={() => setSetupScope(ci)} style={{ display: "flex", alignItems: "center", gap: 14, cursor: "pointer" }}>
                  <div style={{ width: 48, height: 48, borderRadius: "50%", background: C.soft, display: "grid", placeItems: "center", fontSize: 18, fontWeight: 800, flexShrink: 0 }}>{ci + 1}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "baseline" }}>
                      <span style={{ fontSize: 17, fontWeight: 800 }}>{ch.start + 1}–{ch.end}語</span>
                      <span style={{ marginLeft: "auto", fontSize: 14, fontWeight: 800, color: CAT_COLOR["習得"] }}>習得 {pct}%</span>
                    </div>
                    <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginTop: 6, fontSize: 12, fontWeight: 700, color: C.sub }}>
                      {[["習得", cnt["習得"]], ["定着中", cnt["定着中"]], ["学習中", cnt["学習中"]], ["未学習", cnt["未学習"]]].map(([k, n]) => (
                        <span key={k} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                          <span style={{ width: 8, height: 8, borderRadius: "50%", background: CAT_COLOR[k] }} />{k} {n}
                        </span>
                      ))}
                    </div>
                  </div>
                  <ChevronRight size={18} color={C.sub} />
                </Card>
              );
            })}
          </div>
        </div>
      ) : (
        <div>
          <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap" }}>
            <Btn small kind="ghost" icon={copied ? Check : Copy} onClick={copy}>{copied ? "コピーしました" : "タブ区切りでコピー"}</Btn>
            <Btn small kind="ghost" onClick={() => setShowExport(!showExport)}>{showExport ? "テキストを閉じる" : "テキスト表示"}</Btn>
          </div>
          {showExport && (
            <textarea readOnly value={tsv} rows={10} onFocus={(e) => e.target.select()} style={{ width: "100%", fontFamily: "monospace", fontSize: 12, padding: 12, border: `1px solid ${C.line}`, borderRadius: 12, background: "#F1EBDC", marginBottom: 14 }} />
          )}
          <Card style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 14, fontWeight: 800, marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}><Plus size={15} /> カードを追加</div>
            <div style={{ display: "grid", gap: 8 }}>
              <input value={w} onChange={(e) => setW(e.target.value)} placeholder={(deck.subject || "en") === "ja" ? "おもて（例：あはれなり、大政奉還の年）" : "英単語・熟語（表面）"} style={{ fontSize: 14, padding: "10px 14px", border: `1px solid ${C.line}`, borderRadius: 10, background: C.white }} />
              <input value={mn} onChange={(e) => setMn(e.target.value)} placeholder="意味（裏面）" style={{ fontSize: 14, padding: "10px 14px", border: `1px solid ${C.line}`, borderRadius: 10, background: C.white }} />
              <input value={ex} onChange={(e) => setEx(e.target.value)} placeholder="例文（任意）" style={{ fontSize: 14, padding: "10px 14px", border: `1px solid ${C.line}`, borderRadius: 10, background: C.white }} />
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
              <Btn small onClick={addCard} disabled={!w.trim() || !mn.trim()}>追加する</Btn>
              <Btn small kind="ghost" onClick={() => setScanning(true)}>📷 写真からスキャン</Btn>
            </div>
          </Card>
          {scanning && <ScanModal deck={deck} update={update} onClose={() => setScanning(false)} />}
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
            {["すべて", "未学習", "苦手", "学習中", "定着中", "習得"].map((k) => {
              const n = k === "すべて" ? deck.cards.length : deck.cards.filter((c) => catOf(c) === k).length;
              return (
                <button key={k} onClick={() => { setCatF(k); setLimit(50); }} style={{
                  fontFamily: F, fontSize: 12, fontWeight: 800, padding: "6px 11px", borderRadius: 999, border: "none", cursor: "pointer",
                  background: catF === k ? C.dark : C.card, color: catF === k ? C.white : C.sub,
                }}>{k} {n}</button>
              );
            })}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, background: "#E7E0D0", borderRadius: 999, padding: "10px 16px", marginBottom: 12 }}>
            <Search size={16} color={C.sub} />
            <input value={q} onChange={(e) => { setQ(e.target.value); setLimit(50); }} placeholder={`${deck.cards.length}語から検索`} style={{ background: "none", border: "none", outline: "none", fontSize: 14, color: C.ink, width: "100%" }} />
          </div>
          {deck.cards.length === 0 ? (
            <Card style={{ textAlign: "center", color: C.sub, fontSize: 14, padding: 26 }}>まだカードがありません。上のフォームから追加してください。</Card>
          ) : (
            <>
              <div style={{ fontSize: 12, color: C.sub, fontWeight: 700, marginBottom: 8 }}>{ql ? `検索結果 ${filtered.length}語` : `全 ${filtered.length}語`}（{Math.min(limit, filtered.length)}語まで表示中）</div>
              <div style={{ display: "grid", gap: 8 }}>
                {shown.map(({ c, i }) => (
                  <Card key={i} style={{ padding: "12px 16px", position: "relative" }}>
                    <button onClick={() => removeCard(i)} aria-label="このカードを削除" style={{ position: "absolute", right: 10, top: 10, background: C.soft, border: "none", borderRadius: "50%", width: 26, height: 26, cursor: "pointer", display: "grid", placeItems: "center" }}><X size={13} color={C.sub} /></button>
                    <div style={{ display: "flex", alignItems: "baseline", gap: 8, flexWrap: "wrap", paddingRight: 30 }}>
                      <span style={{ fontSize: 16, fontWeight: 800 }}>{c.word}</span>
                      {c.tag && <span style={{ fontSize: 10, fontWeight: 800, color: C.white, background: C.gold, borderRadius: 4, padding: "2px 7px" }}>{c.tag}</span>}
                      <span style={{ fontSize: 11, fontWeight: 800, color: CAT_COLOR[catOf(c)] }}>{catOf(c)}</span>
                    </div>
                    <div style={{ fontSize: 13, marginTop: 2 }}>{c.meaning}</div>
                    {(c.wordImg || c.meaningImg) && (
                      <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
                        {c.wordImg && <img src={c.wordImg} alt="" style={{ height: 44, borderRadius: 6, border: `1px solid ${C.line}` }} />}
                        {c.meaningImg && <img src={c.meaningImg} alt="" style={{ height: 44, borderRadius: 6, border: `1px solid ${C.line}` }} />}
                      </div>
                    )}
                    {c.example && <div style={{ fontSize: 12, color: C.sub, marginTop: 2, fontStyle: "italic" }}>{c.example}</div>}
                  </Card>
                ))}
              </div>
              {filtered.length > limit && (
                <div style={{ textAlign: "center", marginTop: 14 }}>
                  <Btn small kind="ghost" onClick={() => setLimit(limit + 100)}>さらに表示（のこり{filtered.length - limit}語）</Btn>
                </div>
              )}
            </>
          )}
        </div>
      )}
    </div>
  );
}

/* ---------- session setup ---------- */
function SessionSetup({ deck, scope, onBack, onStart }) {
  const t = todayStr();
  const chapters = chaptersOf(deck);
  const range = scope === "all" ? [0, deck.cards.length] : [chapters[scope].start, chapters[scope].end];
  const label = scope === "all" ? `すべての単語（${deck.cards.length}語）` : `チャプター${scope + 1}（${range[0] + 1}–${range[1]}語）`;

  const items = [];
  for (let i = range[0]; i < range[1]; i++) items.push({ i, c: deck.cards[i] });
  const nigate = items.filter(({ c }) => catOf(c) === "苦手");
  const mikaku = items.filter(({ c }) => catOf(c) === "未学習");
  const dueNow = items.filter(({ c }) => c.seen && (c.level || 0) >= 1 && (c.due || t) <= t);
  const rest = items.filter(({ c }) => {
    const k = catOf(c);
    return k !== "苦手" && k !== "未学習" && !(c.seen && (c.level || 0) >= 1 && (c.due || t) <= t) && k !== "習得";
  });
  const omakase = [...nigate, ...dueNow, ...mikaku, ...rest];
  const pools = { おまかせ: omakase, 苦手: nigate, 未学習: mikaku, すべて: items };

  const [pool, setPool] = useState(omakase.length > 0 ? "おまかせ" : "すべて");
  const [count, setCount] = useState(20);
  const [mode, setMode] = useState("card");
  const [order, setOrder] = useState("std");
  const [form, setForm] = useState("EJ");

  const n = Math.min(count, pools[pool].length);
  const isJa = (deck.subject || "en") === "ja";
  const formOptions = isJa ? [["EJ", "表 → 裏"], ["JE", "裏 → 表"]] : [["EJ", "英日"], ["JE", "日英"], ["LI", "リスニング"]];
  const formDesc = isJa
    ? { EJ: "おもてを見て、うらを答える", JE: "うらを見て、おもてを答える" }[form]
    : { EJ: "英単語を見て意味を答える", JE: "意味を見て英単語を答える", LI: "音声を聞いて意味を答える" }[form];

  const start = () => {
    let pick = [...pools[pool]];
    if (order === "random") shuffleArr(pick);
    pick = pick.slice(0, n).map(({ i }) => i);
    let questions = null;
    if (mode === "choice") {
      const akey = form === "JE" ? "word" : "meaning";
      pick = pick.filter((idx) => ((deck.cards[idx][akey] || "").trim() && deck.cards[idx][akey] !== "（画像）"));
      questions = pick.map((idx) => {
        const card = deck.cards[idx];
        const key = form === "JE" ? "word" : "meaning";
        const others = deck.cards.filter((c) => c.word !== card.word && c[key] !== card[key]);
        const ds = [];
        const bag = [...others];
        while (ds.length < 3 && bag.length) {
          const k = Math.floor(Math.random() * bag.length);
          const v = bag.splice(k, 1)[0][key];
          if (!ds.includes(v)) ds.push(v);
        }
        const choices = shuffleArr([...ds, card[key]]);
        return { choices, answer: choices.indexOf(card[key]) };
      });
    }
    onStart({ title: label, mode, form, indices: pick, questions });
  };

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", marginBottom: 16 }}>
        <button onClick={onBack} style={{ background: "none", border: "none", color: C.ink, fontFamily: F, fontSize: 17, fontWeight: 800, cursor: "pointer", padding: 0, display: "flex", alignItems: "center", gap: 8 }}><ChevronLeft size={20} />{label}</button>
        <span style={{ marginLeft: "auto", fontSize: 14, color: C.sub, fontWeight: 800 }}>{items.length}語</span>
      </div>

      <div style={{ fontSize: 14, fontWeight: 800, color: C.sub, marginBottom: 8 }}>出題する単語</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginBottom: 10 }}>
        {["おまかせ", "苦手", "未学習", "すべて"].map((k) => {
          const disabled = pools[k].length === 0;
          const active = pool === k;
          return (
            <button key={k} onClick={() => !disabled && setPool(k)} disabled={disabled} style={{
              fontFamily: F, fontWeight: 800, padding: "14px 4px", borderRadius: 16, border: "none",
              cursor: disabled ? "default" : "pointer",
              background: active ? C.orange : C.card, color: active ? C.white : disabled ? "#C9C0AC" : C.ink,
              boxShadow: active ? "0 2px 8px rgba(188,78,40,.3)" : "0 1px 3px rgba(60,50,30,.06)",
            }}>
              <div style={{ fontSize: 15 }}>{k}</div>
              <div style={{ fontSize: 12, marginTop: 2, opacity: 0.85 }}>{pools[k].length}問</div>
            </button>
          );
        })}
      </div>
      {pool === "おまかせ" && <div style={{ fontSize: 13, color: C.orange, fontWeight: 800, marginBottom: 16, display: "flex", alignItems: "center", gap: 6 }}><Sparkles size={14} /> 習熟度と学習日をもとに、効率よく覚えられる順で出題します</div>}

      <div style={{ fontSize: 14, fontWeight: 800, color: C.sub, margin: "14px 0 8px" }}>語数</div>
      <Card style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 18px", marginBottom: 16 }}>
        <Layers size={20} color={C.orange} />
        <span style={{ fontSize: 16, fontWeight: 800 }}>語数 / 回</span>
        <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 14 }}>
          <button onClick={() => setCount(Math.max(5, count - 5))} style={{ width: 42, height: 42, borderRadius: "50%", border: "none", background: C.orange, color: C.white, cursor: "pointer", display: "grid", placeItems: "center" }}><Minus size={18} /></button>
          <span style={{ fontSize: 26, fontWeight: 800, minWidth: 52, textAlign: "center" }}>{count}<span style={{ fontSize: 13, color: C.sub }} > 語</span></span>
          <button onClick={() => setCount(Math.min(100, count + 5))} style={{ width: 42, height: 42, borderRadius: "50%", border: "none", background: C.orange, color: C.white, cursor: "pointer", display: "grid", placeItems: "center" }}><Plus size={18} /></button>
        </div>
      </Card>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 16 }}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 800, color: C.sub, marginBottom: 8 }}>学習モード</div>
          <div style={{ display: "flex", background: "#E4DCC9", borderRadius: 999, padding: 4 }}>
            {[["card", "カード"], ["choice", "4択"]].map(([k, l]) => (
              <button key={k} onClick={() => setMode(k)} style={{ flex: 1, fontFamily: F, fontSize: 14, fontWeight: 800, padding: "10px 0", borderRadius: 999, border: "none", cursor: "pointer", background: mode === k ? C.dark : "transparent", color: mode === k ? C.white : C.sub }}>{l}</button>
            ))}
          </div>
        </div>
        <div>
          <div style={{ fontSize: 14, fontWeight: 800, color: C.sub, marginBottom: 8 }}>出題順</div>
          <div style={{ display: "flex", background: "#E4DCC9", borderRadius: 999, padding: 4 }}>
            {[["std", "標準"], ["random", "ランダム"]].map(([k, l]) => (
              <button key={k} onClick={() => setOrder(k)} style={{ flex: 1, fontFamily: F, fontSize: 14, fontWeight: 800, padding: "10px 0", borderRadius: 999, border: "none", cursor: "pointer", background: order === k ? C.dark : "transparent", color: order === k ? C.white : C.sub }}>{l}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ fontSize: 14, fontWeight: 800, color: C.sub, marginBottom: 8 }}>出題形式</div>
      <div style={{ display: "flex", gap: 10, marginBottom: 8 }}>
        {formOptions.map(([k, l]) => (
          <button key={k} onClick={() => setForm(k)} style={{
            fontFamily: F, fontSize: 15, fontWeight: 800, padding: "13px 20px", borderRadius: 999, border: "none", cursor: "pointer",
            background: form === k ? C.dark : C.card, color: form === k ? C.white : C.ink,
            boxShadow: form === k ? "none" : "0 1px 3px rgba(60,50,30,.06)",
          }}>{l}</button>
        ))}
      </div>
      <div style={{ fontSize: 13, color: C.sub, fontWeight: 700, marginBottom: 20 }}>{formDesc}</div>

      <Btn onClick={start} disabled={n === 0} style={{ width: "100%", justifyContent: "center", padding: "17px 20px", fontSize: 18 }}>
        <Play size={18} /> スタート（{n}語）
      </Btn>
    </div>
  );
}

/* ---------- study session ---------- */
function StudySession({ deck, session, setSession, gradeCard, onExit }) {
  const [pos, setPos] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [picked, setPicked] = useState(null);
  const [got, setGot] = useState(0);
  const [miss, setMiss] = useState(0);

  const total = session.indices.length;
  const done = pos >= total;
  const realIdx = !done ? session.indices[pos] : null;
  const card = realIdx !== null ? deck.cards[realIdx] : null;
  const isJa = (deck.subject || "en") === "ja";
  const speak = isJa ? speakJa : speakEn;

  useEffect(() => {
    if (session.form === "LI" && card && !flipped && picked === null) speak(card.word);
    // eslint-disable-next-line
  }, [pos]);

  const advance = () => { setFlipped(false); setPicked(null); setPos(pos + 1); };
  const grade = (ok) => {
    buzz(ok ? 15 : 45);
    gradeCard(realIdx, ok);
    if (ok) setGot(got + 1); else setMiss(miss + 1);
    advance();
  };
  const restart = () => { setPos(0); setFlipped(false); setPicked(null); setGot(0); setMiss(0); };

  const lv = card ? (card.level || 0) : 0;
  const front = card ? (session.form === "JE" ? card.meaning : card.word) : "";

  return (
    <div style={{ minHeight: "80vh", display: "flex", flexDirection: "column" }}>
      <button onClick={onExit} style={{ background: "none", border: "none", color: C.sub, fontFamily: F, fontSize: 14, fontWeight: 800, cursor: "pointer", padding: 0, marginBottom: 8, display: "flex", alignItems: "center", gap: 4 }}><ChevronLeft size={16} />設定にもどる</button>
      <div style={{ fontSize: 19, fontWeight: 800, marginBottom: 10 }}>{session.title} ・ {total}語</div>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
        <span style={{ fontSize: 14, fontWeight: 800, color: C.sub }}>{String(Math.min(pos + 1, total)).padStart(2, "0")}/{total}</span>
        <div style={{ flex: 1, height: 8, background: "#E9E2D2", borderRadius: 4 }}>
          <div style={{ height: 8, width: `${(pos / total) * 100}%`, background: C.orange, borderRadius: 4, transition: "width .2s" }} />
        </div>
        <span style={{ fontSize: 14, fontWeight: 800, color: C.gold }}>? {miss}</span>
        <span style={{ fontSize: 14, fontWeight: 800, color: CAT_COLOR["習得"] }}>✓ {got}</span>
      </div>

      {done ? (
        <Card style={{ textAlign: "center", padding: 40 }}>
          <div style={{ fontSize: 42 }}>{miss === 0 ? "🏆" : "✅"}</div>
          <div style={{ fontSize: 22, fontWeight: 800, margin: "8px 0" }}>おつかれさま！</div>
          <div style={{ fontSize: 14, color: C.sub, marginBottom: 18 }}>覚えた {got}語 ・ まだ {miss}語。「まだ」の語は次回優先で出題されます。</div>
          <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
            <Btn kind="ghost" onClick={restart}>もう一度</Btn>
            <Btn onClick={onExit}>おわる</Btn>
          </div>
        </Card>
      ) : session.mode === "choice" ? (
        <>
          <Card style={{ textAlign: "center", padding: "30px 20px", marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <span style={{ fontSize: 11, fontWeight: 800, color: C.orange, background: C.orangeSoft, borderRadius: 999, padding: "4px 10px" }}>{isJa ? "カード" : card.word.includes(" ") ? "フレーズ" : "単語"}</span>
              <span style={{ fontSize: 11, fontWeight: 800, color: C.sub, background: C.soft, borderRadius: 999, padding: "4px 10px" }}>{catOf(card)}</span>
            </div>
            {session.form === "LI" ? (
              <button onClick={() => speak(card.word)} style={{ background: C.orangeSoft, border: "none", borderRadius: "50%", width: 76, height: 76, cursor: "pointer", display: "grid", placeItems: "center", margin: "6px auto" }}><Volume2 size={32} color={C.orange} /></button>
            ) : (
              <div style={{ width: "100%" }}>
                <div style={{ fontSize: front.length > 14 ? 22 : 30, fontWeight: 800, lineHeight: 1.5 }}>{front}</div>
                <CardImg src={session.form === "JE" ? card.meaningImg : card.wordImg} />
              </div>
            )}
            <div style={{ fontSize: 12, color: C.sub, marginTop: 8 }}>{session.form === "JE" ? "正しい英語は？" : "正しい意味は？"}</div>
          </Card>
          <div style={{ display: "grid", gap: 8 }}>
            {session.questions[pos].choices.map((c, ci) => {
              const q = session.questions[pos];
              const isP = picked === ci, isA = q.answer === ci, ans = picked !== null;
              return (
                <button key={ci} onClick={() => { if (picked !== null) return; buzz(ci === q.answer ? 15 : 45); setPicked(ci); gradeCard(realIdx, ci === q.answer); if (ci === q.answer) setGot(got + 1); else setMiss(miss + 1); }} style={{
                  textAlign: "left", fontFamily: F, fontSize: 15, fontWeight: 700, padding: "14px 16px", borderRadius: 12,
                  cursor: ans ? "default" : "pointer",
                  border: `1.5px solid ${ans && isA ? CAT_COLOR["習得"] : ans && isP ? C.orange : C.line}`,
                  background: ans && isA ? "#EAF4EC" : ans && isP ? "#FBEAE2" : C.card, color: C.ink,
                }}>{c}{ans && isA && " ✓"}</button>
              );
            })}
          </div>
          {picked !== null && (
            <Btn onClick={advance} style={{ width: "100%", justifyContent: "center", marginTop: 14 }}>{pos + 1 >= total ? "結果を見る" : "次へ"}</Btn>
          )}
        </>
      ) : (
        <>
          <Card onClick={() => setFlipped(!flipped)} style={{ padding: "24px 20px", textAlign: "center", cursor: "pointer", minHeight: 300, display: "flex", flexDirection: "column" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 11, fontWeight: 800, color: C.orange, background: C.orangeSoft, borderRadius: 999, padding: "4px 10px" }}>{isJa ? "カード" : card.word.includes(" ") ? "フレーズ" : "単語"}</span>
              <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontSize: 11, fontWeight: 800, color: C.sub, background: C.soft, borderRadius: 999, padding: "4px 10px" }}>{catOf(card)}</span>
                <span style={{ display: "flex", gap: 3 }}>
                  {[0, 1, 2, 3, 4].map((d) => <span key={d} style={{ width: 8, height: 8, borderRadius: "50%", background: d < lv ? C.gold : "#DDD5C2" }} />)}
                </span>
              </span>
            </div>
            <div style={{ margin: "14px 0 4px", fontSize: 18, letterSpacing: 3 }}>
              {[0, 1, 2].map((s) => <span key={s} style={{ color: lv >= s * 2 + 1 ? C.gold : "#DDD5C2" }}>★</span>)}
            </div>
            <div style={{ flex: 1, display: "grid", placeItems: "center" }}>
              {!flipped ? (
                session.form === "LI" ? (
                  <div>
                    <button onClick={(e) => { e.stopPropagation(); speak(card.word); }} style={{ background: C.orangeSoft, border: "none", borderRadius: "50%", width: 84, height: 84, cursor: "pointer", display: "grid", placeItems: "center", margin: "0 auto" }}><Volume2 size={36} color={C.orange} /></button>
                    <div style={{ fontSize: 12, color: C.sub, marginTop: 14 }}>タップで答え ・ 🔊で再生</div>
                  </div>
                ) : (
                  <div style={{ width: "100%" }}>
                    <div style={{ fontSize: front.length > 14 ? 26 : 38, fontWeight: 800, lineHeight: 1.4 }}>{front}</div>
                    <CardImg src={session.form === "JE" ? card.meaningImg : card.wordImg} big />
                    <div style={{ fontSize: 12, color: C.sub, marginTop: 14 }}>タップで答え</div>
                  </div>
                )
              ) : (
                <div style={{ width: "100%" }}>
                  <div style={{ fontSize: 16, color: C.sub, fontWeight: 700 }}>{card.word}</div>
                  <div style={{ fontSize: 24, fontWeight: 800, margin: "8px 0" }}>{card.meaning}</div>
                  <CardImg src={session.form === "JE" ? card.wordImg : card.meaningImg} big />
                  {card.example && (
                    <div style={{ fontSize: 13, color: C.sub, fontStyle: "italic", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                      <span>{card.example}</span>
                      <button onClick={(e) => { e.stopPropagation(); speak(card.example); }} aria-label="例文を再生" style={{ background: C.soft, border: "none", borderRadius: "50%", width: 30, height: 30, cursor: "pointer", display: "grid", placeItems: "center", flexShrink: 0 }}><Volume2 size={14} color={C.orange} /></button>
                    </div>
                  )}
                </div>
              )}
            </div>
          </Card>

          <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 16 }}>
            <button onClick={() => { if (pos > 0) { setPos(pos - 1); setFlipped(false); } }} style={{ width: 52, height: 52, borderRadius: "50%", border: "none", background: C.white, cursor: "pointer", display: "grid", placeItems: "center", boxShadow: "0 1px 4px rgba(60,50,30,.12)" }}><ChevronLeft size={20} /></button>
            <button onClick={() => grade(false)} style={{ flex: 1, fontFamily: F, fontSize: 16, fontWeight: 800, padding: "15px 0", borderRadius: 999, border: "none", background: "#F3E3B5", color: "#9A7414", cursor: "pointer" }}>✕ まだ</button>
            <button onClick={() => grade(true)} style={{ flex: 1, fontFamily: F, fontSize: 16, fontWeight: 800, padding: "15px 0", borderRadius: 999, border: "none", background: CAT_COLOR["習得"], color: C.white, cursor: "pointer" }}>✓ 覚えた</button>
            <button onClick={advance} style={{ width: 52, height: 52, borderRadius: "50%", border: "none", background: C.white, cursor: "pointer", display: "grid", placeItems: "center", boxShadow: "0 1px 4px rgba(60,50,30,.12)" }}><ChevronRight size={20} /></button>
          </div>
          <div style={{ display: "flex", justifyContent: "center", gap: 30, marginTop: 16 }}>
            <button onClick={() => speak(card.word)} style={{ background: "none", border: "none", fontFamily: F, fontSize: 14, fontWeight: 800, color: C.ink, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}><Volume2 size={17} color={C.orange} /> {isJa ? "読み上げ" : "発音"}</button>
            <button onClick={restart} style={{ background: "none", border: "none", fontFamily: F, fontSize: 14, fontWeight: 800, color: C.ink, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}><RotateCcw size={16} /> 最初から</button>
          </div>
        </>
      )}
    </div>
  );
}

/* ---------- SRS review ---------- */
function ReviewMode({ data, update, opts, onClose }) {
  const [queue] = useState(() => {
    const t = todayStr();
    const q = [];
    for (const d of data.decks) {
      if (opts.deckId && d.id !== opts.deckId) continue;
      d.cards.forEach((c, i) => { if (opts.tag && c.tag !== opts.tag) return; if (opts.all || (c.due || t) <= t) q.push({ deckId: d.id, idx: i, card: c }); });
    }
    for (let i = q.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [q[i], q[j]] = [q[j], q[i]]; }
    return q;
  });
  const [pos, setPos] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [checkpoint, setCheckpoint] = useState(20);
  const [reverse, setReverse] = useState(false);
  const [good, setGood] = useState(0);

  const done = pos >= queue.length;
  const atBreak = !done && pos >= checkpoint;
  const cur = queue[pos];

  const grade = (ok) => {
    buzz(ok ? 15 : 45);
    update((d) => {
      const card = d.decks.find((x) => x.id === cur.deckId).cards[cur.idx];
      if (!card) return d;
      card.seen = true;
      if (ok) { card.level = Math.min((card.level || 0) + 1, 5); card.due = addDays(todayStr(), SRS_INTERVALS[Math.min(card.level, SRS_INTERVALS.length - 1)]); }
      else { card.level = 0; card.due = addDays(todayStr(), 1); }
      return d;
    });
    if (ok) setGood(good + 1);
    setFlipped(false);
    setPos(pos + 1);
  };

  return (
    <div style={{ minHeight: "80vh", display: "flex", flexDirection: "column" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
        <button onClick={onClose} style={{ background: C.white, border: "none", borderRadius: "50%", width: 38, height: 38, cursor: "pointer", display: "grid", placeItems: "center" }}><X size={18} /></button>
        <div style={{ fontSize: 13, fontWeight: 800, color: C.orange }}>{opts.tag ? `${opts.tag}の単語` : opts.all ? "先取り復習" : "今日の復習"}</div>
        <button onClick={() => { setReverse(!reverse); setFlipped(false); }} style={{ marginLeft: "auto", fontFamily: F, fontSize: 12, fontWeight: 800, padding: "7px 12px", borderRadius: 999, border: `1.5px solid ${C.line}`, background: reverse ? C.dark : C.white, color: reverse ? C.white : C.ink, cursor: "pointer" }}>
          {reverse ? "裏 → 表" : "表 → 裏"}
        </button>
        <div style={{ fontSize: 13, fontWeight: 800, color: C.sub }}>{Math.min(pos + 1, queue.length)} / {queue.length}</div>
      </div>
      <div style={{ height: 6, background: "#E9E2D2", borderRadius: 3, marginBottom: 22 }}>
        <div style={{ height: 6, width: `${queue.length ? (pos / queue.length) * 100 : 0}%`, background: C.orange, borderRadius: 3, transition: "width .2s" }} />
      </div>

      {done ? (
        <Card style={{ textAlign: "center", padding: 40 }}>
          <div style={{ fontSize: 42 }}>{queue.length === 0 ? "🌱" : "✅"}</div>
          <div style={{ fontSize: 22, fontWeight: 800, margin: "8px 0" }}>{queue.length === 0 ? "復習するカードがありません" : "復習完了！"}</div>
          <div style={{ fontSize: 14, color: C.sub, marginBottom: 18 }}>
            {queue.length === 0 ? "単語帳にカードを追加すると、ここで復習できます。" : `${queue.length}枚中 ${good}枚「わかった」。覚えた語は間隔をあけて再出題されます。`}
          </div>
          <Btn onClick={onClose}>おわる</Btn>
        </Card>
      ) : atBreak ? (
        <Card style={{ textAlign: "center", padding: 40 }}>
          <div style={{ fontSize: 42 }}>☕</div>
          <div style={{ fontSize: 22, fontWeight: 800, margin: "8px 0" }}>{pos}枚 完了！</div>
          <div style={{ fontSize: 14, color: C.sub, marginBottom: 18 }}>ここまで「わかった」{good}枚。のこり {queue.length - pos}枚あります。無理せず区切るのも大切です。</div>
          <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
            <Btn kind="ghost" onClick={onClose}>ここまでにする</Btn>
            <Btn onClick={() => setCheckpoint(checkpoint + 20)}>つづける（あと20枚）</Btn>
          </div>
        </Card>
      ) : (
        <>
          <Card onClick={() => setFlipped(!flipped)} style={{ padding: 34, textAlign: "center", cursor: "pointer", minHeight: 220, display: "grid", placeItems: "center" }}>
            {!flipped ? (
              <div>
                <div style={{ fontSize: reverse ? 22 : 30, fontWeight: 800 }}>{reverse ? cur.card.meaning : cur.card.word}</div>
                <div style={{ fontSize: 12, color: C.sub, marginTop: 12 }}>タップして答えを見る</div>
              </div>
            ) : (
              <div>
                <div style={{ fontSize: 15, color: C.sub, fontWeight: 700 }}>{cur.card.word}{cur.card.pos ? `（${cur.card.pos}）` : ""}</div>
                <div style={{ fontSize: 22, fontWeight: 800, margin: "8px 0" }}>{cur.card.meaning}</div>
                {cur.card.example && <div style={{ fontSize: 13, color: C.sub, fontStyle: "italic" }}>{cur.card.example}</div>}
              </div>
            )}
          </Card>
          {flipped && (
            <div style={{ display: "flex", gap: 12, marginTop: 16 }}>
              <Btn kind="ghost" onClick={() => grade(false)} style={{ flex: 1, justifyContent: "center", color: C.orange, borderColor: C.orange }}>まだ</Btn>
              <Btn onClick={() => grade(true)} style={{ flex: 1, justifyContent: "center" }}>わかった</Btn>
            </div>
          )}
        </>
      )}
    </div>
  );
}

/* ---------- card image helper ---------- */
function CardImg({ src, big }) {
  if (!src) return null;
  return <img src={src} alt="" style={{ display: "block", maxWidth: "100%", maxHeight: big ? 200 : 150, margin: "10px auto 0", borderRadius: 10, border: `1px solid ${C.line}` }} />;
}

/* ---------- photo scan modal (NEON CARD式: 1枚の写真から表→裏を連続切り出し) ---------- */
function ScanModal({ deck, update, onClose }) {
  const imgRef = useRef(null);
  const cropperRef = useRef(null);
  const fileRef = useRef(null);
  const [imgSrc, setImgSrc] = useState(null);
  const [step, setStep] = useState("q"); // q = 表, a = 裏
  const [capQ, setCapQ] = useState(null); // {text, img?}
  const [capA, setCapA] = useState(null);
  const [ocrBusy, setOcrBusy] = useState(false);
  const [ocrProg, setOcrProg] = useState(0);
  const [added, setAdded] = useState(0);
  const [msg, setMsg] = useState("");

  useEffect(() => () => { if (cropperRef.current) { cropperRef.current.destroy(); cropperRef.current = null; } }, []);

  const initCropper = () => {
    if (cropperRef.current) { cropperRef.current.destroy(); cropperRef.current = null; }
    if (imgRef.current && window.Cropper) {
      cropperRef.current = new Cropper(imgRef.current, {
        viewMode: 1, autoCropArea: 0.55, background: false,
        movable: true, zoomable: true, scalable: false, dragMode: "crop", responsive: true, checkOrientation: true,
      });
    }
  };

  const pickFile = (e) => {
    const f = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!f) return;
    const r = new FileReader();
    r.onload = () => { setImgSrc(r.result); setMsg(""); };
    r.readAsDataURL(f);
  };

  const getCanvas = (maxDim) => {
    if (!cropperRef.current) return null;
    return cropperRef.current.getCroppedCanvas({ maxWidth: maxDim, maxHeight: maxDim, imageSmoothingQuality: "high" });
  };

  const keep = (cap) => {
    if (step === "q") {
      setCapQ(cap); setStep("a");
      if (cropperRef.current) cropperRef.current.reset();
      setMsg("表を保持しました。続けて裏（答え）を囲んでください");
    } else {
      setCapA(cap);
      setMsg("裏を保持しました。内容を確認して「カードを追加」");
    }
  };

  const captureImage = () => {
    const cv = getCanvas(640);
    if (!cv) { setMsg("範囲を指定してください"); return; }
    keep({ text: "", img: cv.toDataURL("image/jpeg", 0.7) });
  };

  const captureOCR = async () => {
    const cv = getCanvas(1300);
    if (!cv) { setMsg("範囲を指定してください"); return; }
    if (!window.Tesseract) { setMsg("文字認識ライブラリの読み込み待ちです。少し待ってから再試行してください"); return; }
    setOcrBusy(true); setOcrProg(0);
    try {
      const { data: res } = await Tesseract.recognize(cv, "jpn+eng", {
        logger: (m) => { if (m.status === "recognizing text") setOcrProg(Math.round((m.progress || 0) * 100)); },
      });
      keep({ text: (res.text || "").replace(/\s+/g, " ").trim() });
    } catch { setMsg("文字認識に失敗しました。もう一度お試しください"); }
    setOcrBusy(false);
  };

  const canSave = capQ && capA && ((capQ.text || "").trim() || capQ.img) && ((capA.text || "").trim() || capA.img);

  const saveCard = () => {
    if (!canSave) return;
    const word = (capQ.text || "").trim() || "（画像）";
    const meaning = (capA.text || "").trim() || "（画像）";
    update((d) => {
      d.decks.find((x) => x.id === deck.id).cards.unshift({
        word, meaning, example: "", pos: "", tag: "", level: 0, due: todayStr(),
        ...(capQ.img ? { wordImg: capQ.img } : {}), ...(capA.img ? { meaningImg: capA.img } : {}),
      });
      return d;
    });
    buzz(15);
    setAdded(added + 1);
    setCapQ(null); setCapA(null); setStep("q");
    if (cropperRef.current) cropperRef.current.reset();
    setMsg("カードを追加しました。同じ写真から続けて作れます");
  };

  const editCap = (which, text) => (which === "q" ? setCapQ({ ...capQ, text }) : setCapA({ ...capA, text }));

  const Preview = ({ label, cap, which, color }) => (
    <div style={{ flex: 1, border: `1.5px solid ${cap ? color : C.line}`, borderRadius: 12, padding: 8, background: C.white, minWidth: 0 }}>
      <div style={{ fontSize: 11, fontWeight: 800, color, marginBottom: 4 }}>{label}</div>
      {!cap ? (
        <div style={{ fontSize: 12, color: C.sub }}>未選択</div>
      ) : (
        <>
          {cap.img && <img src={cap.img} alt="" style={{ maxWidth: "100%", maxHeight: 70, borderRadius: 8, display: "block", marginBottom: 4 }} />}
          <input value={cap.text} onChange={(e) => editCap(which, e.target.value)} placeholder={cap.img ? "テキスト補足（任意）" : "OCR結果（編集可）"} style={{ width: "100%", boxSizing: "border-box", fontSize: 12, padding: "6px 8px", border: `1px solid ${C.line}`, borderRadius: 8, background: "#FBF8F0" }} />
        </>
      )}
    </div>
  );

  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(40,34,22,.55)", zIndex: 60, display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: C.bg, borderRadius: "22px 22px 0 0", width: "100%", maxWidth: 560, maxHeight: "94vh", overflowY: "auto", padding: 16, boxSizing: "border-box" }}>
        <div style={{ display: "flex", alignItems: "center", marginBottom: 10 }}>
          <span style={{ fontSize: 16, fontWeight: 800 }}>📷 写真からスキャン</span>
          {added > 0 && <span style={{ marginLeft: 10, fontSize: 12, fontWeight: 800, color: CAT_COLOR["習得"] }}>+{added}枚追加済み</span>}
          <button onClick={onClose} style={{ marginLeft: "auto", background: C.white, border: "none", borderRadius: "50%", width: 34, height: 34, cursor: "pointer", display: "grid", placeItems: "center" }}><X size={16} /></button>
        </div>

        {!imgSrc ? (
          <Card style={{ textAlign: "center", padding: 30 }}>
            <div style={{ fontSize: 40 }}>📸</div>
            <p style={{ fontSize: 13, color: C.sub, lineHeight: 1.8, margin: "8px 0 14px" }}>ワークや単語帳のページを撮影（または写真を選択）して、<b>表（問題）→裏（答え）</b>の順に枠で囲むとカードになります。</p>
            <Btn onClick={() => fileRef.current && fileRef.current.click()}>写真を撮る・選ぶ</Btn>
          </Card>
        ) : (
          <>
            <div style={{ display: "flex", gap: 8, marginBottom: 8, fontSize: 12, fontWeight: 800 }}>
              <span style={{ color: step === "q" ? C.orange : C.sub }}>1. 表（問題）を囲む</span>
              <span style={{ color: C.sub }}>→</span>
              <span style={{ color: step === "a" ? CAT_COLOR["苦手"] : C.sub }}>2. 裏（答え）を囲む</span>
            </div>
            <div style={{ borderRadius: 14, overflow: "hidden", background: "#000", maxHeight: "42vh" }}>
              <img ref={imgRef} src={imgSrc} onLoad={initCropper} alt="" style={{ maxWidth: "100%", display: "block" }} />
            </div>
            <div style={{ display: "flex", gap: 8, margin: "10px 0" }}>
              {Preview({ label: "表（問題）", cap: capQ, which: "q", color: C.orange })}
              {Preview({ label: "裏（答え）", cap: capA, which: "a", color: CAT_COLOR["苦手"] })}
            </div>
            {msg && <div style={{ fontSize: 12, fontWeight: 800, color: C.orange, marginBottom: 8 }}>{msg}</div>}
            <div style={{ display: "flex", gap: 8 }}>
              <Btn small onClick={captureOCR} disabled={ocrBusy} style={{ flex: 1, justifyContent: "center" }}>{ocrBusy ? `読み取り中 ${ocrProg}%` : "枠内を文字認識(OCR)"}</Btn>
              <Btn small kind="ghost" onClick={captureImage} disabled={ocrBusy} style={{ flex: 1, justifyContent: "center" }}>枠内を画像で使う</Btn>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
              <Btn small onClick={saveCard} disabled={!canSave} style={{ flex: 2, justifyContent: "center", background: canSave ? CAT_COLOR["習得"] : undefined, borderColor: canSave ? CAT_COLOR["習得"] : undefined }}>✨ この表裏でカードを追加</Btn>
              <Btn small kind="ghost" onClick={() => { setCapQ(null); setCapA(null); setStep("q"); setMsg(""); if (cropperRef.current) cropperRef.current.reset(); }} style={{ flex: 1, justifyContent: "center" }}>選び直す</Btn>
            </div>
            <button onClick={() => fileRef.current && fileRef.current.click()} style={{ background: "none", border: "none", fontFamily: F, fontSize: 12, fontWeight: 800, color: C.sub, cursor: "pointer", margin: "10px auto 4px", display: "block" }}>別の写真にする</button>
          </>
        )}
        <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={pickFile} />
      </div>
    </div>
  );
}

/* ---------- weak-word loop ---------- */
function WeakLoop({ data, update, opts, onClose }) {
  const CD_MISS = 3;   // 「まだ」→ 3枚挟んでから再出題
  const CD_OK = 6;     // 「わかった」1回目 → 6枚挟んでから再出題

  const buildInit = () => {
    const q = [], sp = [];
    for (const d of data.decks) {
      if (opts.deckId && d.id !== opts.deckId) continue;
      d.cards.forEach((c, i) => {
        const lv = c.level || 0;
        if (c.seen && lv === 0) q.push({ deckId: d.id, idx: i, ok: 0, cd: 0 });
        else if (c.seen && lv >= 1 && lv <= 4) sp.push({ deckId: d.id, idx: i });
      });
    }
    return { queue: shuffleArr(q), spacers: shuffleArr(sp) };
  };

  // 次に出すカードを選ぶ（時間待ちなし・枚数ベース）:
  // [1] 最終チェック中ならその先頭
  // [2] クールダウン（挟むべき枚数）を消化した苦手カード
  // [3] なければスペーサー（学習中〜定着中の復習カード）を1枚挟む
  // [4] スペーサーも無ければ、残り枚数が一番少ない苦手カードをすぐ出す
  const pick = (s) => {
    if (s.finalQ && s.finalQ.length) return { kind: "final", item: s.finalQ[0] };
    if (!s.queue.length) {
      if (s.grads.length) return { kind: "startFinal" };
      return { kind: "done" };
    }
    const elig = s.queue.filter((it) => (it.cd || 0) <= 0);
    if (elig.length) return { kind: "weak", item: elig[0] };
    if (s.spacers.length) return { kind: "spacer", item: s.spacers[s.spIdx % s.spacers.length] };
    return { kind: "weak", item: s.queue.reduce((a, b) => ((a.cd || 0) <= (b.cd || 0) ? a : b)) };
  };

  const advance = (s) => {
    let cur = pick(s);
    if (cur.kind === "startFinal") {
      s = { ...s, finalQ: shuffleArr([...s.grads]), grads: [] };
      cur = pick(s);
    }
    return { ...s, cur };
  };

  const [sess, setSess] = useState(() => advance({ ...buildInit(), grads: [], finalQ: null, cleared: 0, spIdx: 0, hist: [] }));
  const [flipped, setFlipped] = useState(false);
  const [reverse, setReverse] = useState(false);

  const { cur } = sess;
  const remaining = sess.queue.length + sess.grads.length + (sess.finalQ ? sess.finalQ.length : 0);
  const total = sess.cleared + remaining;
  const isFinal = cur.kind === "final";
  const isSpacer = cur.kind === "spacer";

  const deckOf = cur.item ? data.decks.find((d) => d.id === cur.item.deckId) : null;
  const card = deckOf ? deckOf.cards[cur.item.idx] : null;
  const isJa = deckOf ? (deckOf.subject || "en") === "ja" : false;
  const speak = isJa ? speakJa : speakEn;

  const clearCard = (item) => update((d) => {
    const c = d.decks.find((x) => x.id === item.deckId).cards[item.idx];
    if (c) { c.seen = true; c.level = Math.min((c.level || 0) + 1, 5); c.due = addDays(todayStr(), SRS_INTERVALS[Math.min(c.level, SRS_INTERVALS.length - 1)]); }
    return d;
  });

  const grade = (ok) => {
    buzz(ok ? 15 : 45);
    setFlipped(false);
    const s0 = sess;
    const { hist, ...snap } = s0;
    let patch = null;
    let s = { ...s0 };
    const { kind, item } = s0.cur;
    // 1枚こなすごとに、キュー内の全カードの「挟むべき残り枚数」を1減らす
    const tickDown = (q) => q.map((it) => (it === item ? it : { ...it, cd: Math.max(0, (it.cd || 0) - 1) }));
    if (kind === "spacer") {
      s.spIdx = s.spIdx + 1;
      s.queue = tickDown(s.queue);
      if (!ok) {
        // 復習カードを間違えたら苦手に降格してこのループに合流
        const c0 = data.decks.find((x) => x.id === item.deckId).cards[item.idx];
        patch = { deckId: item.deckId, idx: item.idx, prev: { level: c0.level || 0, due: c0.due, seen: !!c0.seen } };
        update((d) => {
          const c = d.decks.find((x) => x.id === item.deckId).cards[item.idx];
          if (c) { c.level = 0; c.due = addDays(todayStr(), 1); }
          return d;
        });
        s.spacers = s.spacers.filter((it) => it !== item);
        s.queue = [...s.queue, { deckId: item.deckId, idx: item.idx, ok: 0, cd: CD_MISS }];
      }
    } else if (kind === "final") {
      s.finalQ = s.finalQ.slice(1);
      s.queue = tickDown(s.queue);
      if (ok) {
        const c0 = data.decks.find((x) => x.id === item.deckId).cards[item.idx];
        patch = { deckId: item.deckId, idx: item.idx, prev: { level: c0.level || 0, due: c0.due, seen: !!c0.seen } };
        clearCard(item);
        s.cleared = s.cleared + 1;
      } else {
        // 最終チェックで落ちたらループに戻す
        s.queue = [...s.queue, { deckId: item.deckId, idx: item.idx, ok: 0, cd: CD_MISS }];
      }
    } else {
      s.queue = tickDown(s.queue.filter((it) => it !== item));
      if (ok && (item.ok || 0) + 1 >= 2) {
        // 2回正解 → すぐクリアにせず「卒業待ち」へ。最終チェックで確定
        s.grads = [...s.grads, { deckId: item.deckId, idx: item.idx }];
      } else {
        s.queue = [...s.queue, { ...item, ok: ok ? 1 : 0, cd: ok ? CD_OK : CD_MISS }];
      }
    }
    s.hist = [...hist, { snap, patch }].slice(-30);
    setSess(advance(s));
  };

  const undo = () => {
    const h = sess.hist[sess.hist.length - 1];
    if (!h) return;
    if (h.patch) {
      // データ側の変更（クリア確定・降格）も巻き戻す
      update((d) => {
        const c = d.decks.find((x) => x.id === h.patch.deckId).cards[h.patch.idx];
        if (c) { c.level = h.patch.prev.level; c.due = h.patch.prev.due; c.seen = h.patch.prev.seen; }
        return d;
      });
    }
    buzz(10);
    setFlipped(false);
    setSess({ ...h.snap, hist: sess.hist.slice(0, -1) });
  };

  return (
    <div style={{ minHeight: "80vh", display: "flex", flexDirection: "column" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
        <button onClick={onClose} style={{ background: C.white, border: "none", borderRadius: "50%", width: 38, height: 38, cursor: "pointer", display: "grid", placeItems: "center" }}><X size={18} /></button>
        <div style={{ fontSize: 13, fontWeight: 800, color: CAT_COLOR["苦手"], display: "flex", alignItems: "center", gap: 5 }}><Repeat size={14} /> 苦手ループ</div>
        <button onClick={undo} disabled={!sess.hist.length} style={{ marginLeft: "auto", fontFamily: F, fontSize: 12, fontWeight: 800, padding: "7px 12px", borderRadius: 999, border: `1.5px solid ${C.line}`, background: C.white, color: sess.hist.length ? C.ink : "#C9C0AC", cursor: sess.hist.length ? "pointer" : "default", display: "flex", alignItems: "center", gap: 4 }}>
          <RotateCcw size={13} /> 戻す
        </button>
        <button onClick={() => { setReverse(!reverse); setFlipped(false); }} style={{ fontFamily: F, fontSize: 12, fontWeight: 800, padding: "7px 12px", borderRadius: 999, border: `1.5px solid ${C.line}`, background: reverse ? C.dark : C.white, color: reverse ? C.white : C.ink, cursor: "pointer" }}>
          {reverse ? "裏 → 表" : "表 → 裏"}
        </button>
        <div style={{ fontSize: 13, fontWeight: 800, color: C.sub }}>のこり {remaining}</div>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
        <div style={{ flex: 1, height: 8, background: "#E9E2D2", borderRadius: 4 }}>
          <div style={{ height: 8, width: `${total ? (sess.cleared / total) * 100 : 0}%`, background: CAT_COLOR["苦手"], borderRadius: 4, transition: "width .2s" }} />
        </div>
        <span style={{ fontSize: 13, fontWeight: 800, color: CAT_COLOR["苦手"] }}>クリア {sess.cleared}/{total}</span>
      </div>
      {sess.grads.length > 0 && !isFinal && (
        <div style={{ fontSize: 12, fontWeight: 800, color: "#8A6D1A", background: "#F6EBC8", borderRadius: 10, padding: "8px 12px", marginBottom: 12 }}>
          🎓 卒業待ち {sess.grads.length}語 — 全カードが卒業したら最終チェックで確定します
        </div>
      )}
      {isFinal && (
        <div style={{ fontSize: 12, fontWeight: 800, color: C.white, background: CAT_COLOR["苦手"], borderRadius: 10, padding: "8px 12px", marginBottom: 12 }}>
          🏁 最終チェック — 間を空けても思い出せたらクリア確定！のこり{sess.finalQ.length}語
        </div>
      )}

      {cur.kind === "done" || !card ? (
        <Card style={{ textAlign: "center", padding: 40 }}>
          <div style={{ fontSize: 42 }}>{total === 0 ? "🌱" : "🎉"}</div>
          <div style={{ fontSize: 22, fontWeight: 800, margin: "8px 0" }}>{total === 0 ? "苦手単語がありません" : "全部クリア！"}</div>
          <div style={{ fontSize: 14, color: C.sub, marginBottom: 18 }}>
            {total === 0 ? "復習や学習で「まだ」と答えた語が、ここに溜まっていきます。" : `${sess.cleared}語の苦手を潰しました。間を空けた最終チェックまで通ったので、記憶に残りやすい状態です。明日の復習で定着を確認しましょう。`}
          </div>
          <Btn onClick={onClose}>おわる</Btn>
        </Card>
      ) : (
        <>
          <Card onClick={() => setFlipped(!flipped)} style={{ padding: "26px 20px", textAlign: "center", cursor: "pointer", minHeight: 260, display: "flex", flexDirection: "column" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 11, fontWeight: 800, color: C.sub, background: C.soft, borderRadius: 999, padding: "4px 10px" }}>{deckOf.name}</span>
              {isSpacer ? (
                <span style={{ fontSize: 11, fontWeight: 800, color: "#2E6B8A", background: "#DCEBF3", borderRadius: 999, padding: "4px 10px" }}>⏳ 合間の復習</span>
              ) : isFinal ? (
                <span style={{ fontSize: 11, fontWeight: 800, color: C.white, background: CAT_COLOR["苦手"], borderRadius: 999, padding: "4px 10px" }}>🏁 最終チェック</span>
              ) : (
                <span style={{ display: "flex", alignItems: "center", gap: 5 }}>
                  <span style={{ fontSize: 11, fontWeight: 800, color: C.sub }}>卒業まで</span>
                  {[0, 1].map((d) => <span key={d} style={{ width: 12, height: 12, borderRadius: "50%", background: d < (cur.item.ok || 0) ? CAT_COLOR["習得"] : "#DDD5C2", border: `2px solid ${d < (cur.item.ok || 0) ? CAT_COLOR["習得"] : "#CFC6B0"}` }} />)}
                </span>
              )}
            </div>
            <div style={{ flex: 1, display: "grid", placeItems: "center" }}>
              {!flipped ? (
                <div style={{ width: "100%" }}>
                  <div style={{ fontSize: (reverse ? card.meaning : card.word).length > 14 ? 24 : 34, fontWeight: 800, lineHeight: 1.5 }}>{reverse ? card.meaning : card.word}</div>
                  <CardImg src={reverse ? card.meaningImg : card.wordImg} big />
                  <div style={{ fontSize: 12, color: C.sub, marginTop: 12 }}>タップで答え</div>
                </div>
              ) : (
                <div style={{ width: "100%" }}>
                  <div style={{ fontSize: 15, color: C.sub, fontWeight: 700 }}>{card.word}</div>
                  <div style={{ fontSize: 23, fontWeight: 800, margin: "8px 0" }}>{card.meaning}</div>
                  <CardImg src={reverse ? card.wordImg : card.meaningImg} big />
                  {card.example && <div style={{ fontSize: 13, color: C.sub, fontStyle: "italic" }}>{card.example}</div>}
                </div>

          </Card>
          <div style={{ display: "flex", gap: 12, marginTop: 16 }}>
            <button onClick={() => grade(false)} style={{ flex: 1, fontFamily: F, fontSize: 16, fontWeight: 800, padding: "15px 0", borderRadius: 999, border: "none", background: "#F3E3B5", color: "#9A7414", cursor: "pointer" }}>✕ まだ</button>
            <button onClick={() => grade(true)} style={{ flex: 1, fontFamily: F, fontSize: 16, fontWeight: 800, padding: "15px 0", borderRadius: 999, border: "none", background: CAT_COLOR["習得"], color: C.white, cursor: "pointer" }}>✓ わかった{!isSpacer && !isFinal && cur.item.ok ? "（あと1回）" : ""}</button>
          </div>
          <div style={{ display: "flex", justifyContent: "center", marginTop: 16 }}>
            <button onClick={() => speak(card.word)} style={{ background: "none", border: "none", fontFamily: F, fontSize: 14, fontWeight: 800, color: C.ink, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}><Volume2 size={17} color={C.orange} /> {isJa ? "読み上げ" : "発音"}</button>
          </div>
        </>
      )}
    </div>
  );
}

  const [questions, setQuestions] = useState(null);

  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");

  const generate = async () => {
    if (!mat) return;
    setBusy(true); setError(""); setQuestions(null); setAnswers({});
    try {
      const sentences = mat.parts.flatMap((p) => p.sentences);
      const marked = sentences.filter((s) => Object.values(s.marks).some(Boolean)).map((s) => s.en).slice(0, 6);
      const sample = sentences.slice(0, 12).map((s) => s.en).join(" ");
      const j = parseJSON(await callClaude(
        `あなたは日本の高校英語教師です。次の英文教材から「${exam}」形式の4択問題を4問作成してください（読解1問・語彙2問・文法1問）。弱点箇所を優先的に出題。解説は本文の根拠つきで。
JSONのみ: {"questions":[{"type":"読解","q":"問題文","choices":["A","B","C","D"],"answer":0,"why":"根拠つき解説"}]}

本文: ${sample}
弱点箇所: ${marked.join(" / ") || "なし"}`
      ));
      setQuestions(j.questions || []);
    } catch { setError("問題の生成に失敗しました。もう一度お試しください。"); }
    setBusy(false);
  };

  return (
    <div>
      <H1>問題集</H1>
      <p style={{ fontSize: 14, color: C.sub, margin: "0 0 16px" }}>各教材のスクリプトと弱点から、試験形式の問題をAIが生成します。対象試験を選べて、解説は本文の根拠つき。</p>
      {data.materials.length === 0 ? (
        <Card style={{ textAlign: "center", color: C.sub, fontSize: 14, padding: 30 }}>先に教材を作成してください。</Card>
      ) : (
        <>
          <Card style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 13, fontWeight: 800, color: C.sub, marginBottom: 8 }}>教材</div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 14 }}>
              {data.materials.map((m) => (
                <button key={m.id} onClick={() => setMatId(m.id)} style={{ fontFamily: F, fontSize: 13, fontWeight: 700, padding: "7px 14px", borderRadius: 999, cursor: "pointer", border: `1.5px solid ${matId === m.id ? C.ink : C.line}`, background: matId === m.id ? C.ink : C.white, color: matId === m.id ? C.white : C.ink }}>{m.title}</button>
              ))}
            </div>
            <div style={{ fontSize: 13, fontWeight: 800, color: C.sub, marginBottom: 8 }}>対象試験</div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
              {EXAMS.map((e) => (
                <button key={e} onClick={() => setExam(e)} style={{ fontFamily: F, fontSize: 13, fontWeight: 700, padding: "7px 14px", borderRadius: 999, cursor: "pointer", border: `1.5px solid ${exam === e ? C.orange : C.line}`, background: exam === e ? C.orange : C.white, color: exam === e ? C.white : C.ink }}>{e}</button>
              ))}
            </div>
            <Btn icon={Sparkles} onClick={generate} disabled={busy}>問題を生成</Btn>
            {busy && <Spin label="問題を作成中…" />}
            {error && <p style={{ fontSize: 13, color: C.orange, fontWeight: 700 }}>{error}</p>}
          </Card>
          {questions && (
            <div style={{ display: "grid", gap: 14 }}>
              {questions.map((q, qi) => {
                const picked = answers[qi];
                return (
                  <Card key={qi}>
                    <div style={{ fontSize: 11, fontWeight: 800, color: C.white, background: C.blue, borderRadius: 4, padding: "2px 8px", display: "inline-block", marginBottom: 8 }}>{q.type || "問題"}</div>
                    <div style={{ fontSize: 15, fontWeight: 800, marginBottom: 10 }}>問{qi + 1}．{q.q}</div>
                    <div style={{ display: "grid", gap: 6 }}>
                      {q.choices.map((c, ci) => {
                        const isP = picked === ci, isA = q.answer === ci, done = picked !== undefined;
                        return (
                          <button key={ci} onClick={() => picked === undefined && setAnswers((p) => ({ ...p, [qi]: ci }))} style={{
                            textAlign: "left", fontFamily: F, fontSize: 14, padding: "10px 14px", borderRadius: 10,
                            cursor: done ? "default" : "pointer",
                            border: `1.5px solid ${done && isA ? C.green : done && isP ? C.orange : C.line}`,
                            background: done && isA ? "#EAF4EC" : done && isP ? "#FBEAE2" : C.bg, color: C.ink,
                          }}>{String.fromCharCode(65 + ci)}．{c}{done && isA && " ✓"}</button>
                        );
                      })}
                    </div>
                    {picked !== undefined && (
                      <p style={{ fontSize: 13, lineHeight: 1.8, marginTop: 10, color: C.sub }}>
                        <b style={{ color: picked === q.answer ? C.green : C.orange }}>{picked === q.answer ? "正解！" : "不正解。"}</b> {q.why}
                      </p>
                    )}
                  </Card>
                );
              })}
            </div>
          )}
        </>
      )}
    </div>
  );
}

/* ================= ANALYSIS ================= */
const GRAMMAR_POINTS = ["関係詞", "分詞・分詞構文", "不定詞・動名詞", "仮定法", "比較", "受動態", "時制・完了形", "助動詞", "接続詞・節", "倒置・省略・強調", "前置詞・イディオム", "文型・語順", "その他"];

function AnalysisTab({ data, mastered, onRead, update }) {
  const [aiTab, setAiTab] = useState("文法");
  const [busy, setBusy] = useState("");
  const [err, setErr] = useState("");
  const [goalDraft, setGoalDraft] = useState(data.goal || "");
  const ai = data.ai || {};

  /* ----- aggregate reading-weakness marks ----- */
  const agg = { 聞き取り: { total: 0, done: 0, sentences: [] }, 語彙: { total: 0, done: 0, sentences: [] }, 文法: { total: 0, done: 0, sentences: [] } };
  let bestPart = null;
  for (const m of data.materials) {
    m.parts.forEach((p, pi) => {
      let unresolved = 0;
      const cnt = { 聞き取り: 0, 語彙: 0, 文法: 0 };
      for (const s of p.sentences) {
        for (const t of MARK_TYPES) if (s.marks[t]) {
          agg[t].total++; cnt[t]++;
          if (s.read > 0) agg[t].done++; else unresolved++;
          agg[t].sentences.push(s.en);
        }
      }
      if (unresolved > 0 && (!bestPart || unresolved > bestPart.unresolved)) {
        const read = p.sentences.filter((s) => s.read > 0).length;
        bestPart = { m, pi, p, unresolved, cnt, read };
      }
    });
  }
  const total = MARK_TYPES.reduce((n, t) => n + agg[t].total, 0);
  const done = MARK_TYPES.reduce((n, t) => n + agg[t].done, 0);

  /* ----- grammar classification data ----- */
  const unclassified = [];
  for (const m of data.materials) m.parts.forEach((p, pi) => p.sentences.forEach((s, si) => {
    if (s.marks["文法"] && !s.gpoint) unclassified.push({ mid: m.id, pi, si, en: s.en });
  }));
  const gStats = {};
  for (const m of data.materials) for (const p of m.parts) for (const s of p.sentences) if (s.gpoint) {
    gStats[s.gpoint] = gStats[s.gpoint] || { total: 0, done: 0 };
    gStats[s.gpoint].total++;
    if (s.read > 0) gStats[s.gpoint].done++;
  }
  const gRank = Object.entries(gStats).sort((a, b) => b[1].total - a[1].total);

  /* ----- weak vocabulary ----- */
  const weakCards = [];
  for (const dk of data.decks) for (const c of dk.cards) if (c.seen && (c.level || 0) === 0) weakCards.push(c);

  const fail = (msg) => { setErr(msg); setTimeout(() => setErr(""), 4000); };

  /* ----- ① pattern diagnosis ----- */
  const runDeep = async () => {
    setBusy("deep"); setErr("");
    try {
      const list = agg[aiTab].sentences.slice(0, 10);
      const j = parseJSON(await callClaude(
        `あなたは日本の高校生専門の英語コーチです。生徒が「${aiTab}」の観点でつまずいた英文が以下です。実際の文に共通する弱点傾向を最大3つ特定し、それぞれ音読を軸にした具体的対策を示してください。一般論ではなく、この文リストの特徴に基づくこと。
JSONのみで出力: {"trends":[{"title":"傾向（15字以内）","why":"根拠となる文の特徴（60字以内）","fix":"具体的な対策（80字以内）"}]}

つまずいた文:
${list.join("\n")}`
      ));
      update((d) => { d.ai = d.ai || {}; d.ai.deep = d.ai.deep || {}; d.ai.deep[aiTab] = { date: todayStr(), trends: (j.trends || []).slice(0, 3) }; return d; });
    } catch (e) { fail(e.message === "NO_KEY" ? "設定（⚙）でAPIキーを登録してください。" : "診断に失敗しました。もう一度お試しください。"); }
    setBusy("");
  };

  /* ----- ③ grammar classification ----- */
  const runClassify = async () => {
    setBusy("gram"); setErr("");
    try {
      const target = unclassified.slice(0, 50);
      for (let i = 0; i < target.length; i += 10) {
        const batch = target.slice(i, i + 10);
        const j = parseJSON(await callClaude(
          `次の各英文について、学習者がつまずいた主要文法項目を1つずつ判定してください。必ず次のリストから選ぶこと: ${GRAMMAR_POINTS.join("、")}
JSONのみ: {"points":["項目名"]}（入力と同じ順・同じ数）

${batch.map((x, k) => `${k + 1}. ${x.en}`).join("\n")}`
        ));
        const pts = j.points || [];
        update((d) => {
          batch.forEach((x, k) => {
            const mm = d.materials.find((m) => m.id === x.mid);
            if (mm && pts[k]) mm.parts[x.pi].sentences[x.si].gpoint = GRAMMAR_POINTS.includes(pts[k]) ? pts[k] : "その他";
          });
          return d;
        });
      }
    } catch (e) { fail(e.message === "NO_KEY" ? "設定（⚙）でAPIキーを登録してください。" : "分類に失敗しました。もう一度お試しください。"); }
    setBusy("");
  };

  /* ----- weak-word clustering ----- */
  const runVocabWeak = async () => {
    setBusy("vocab"); setErr("");
    try {
      const sample = weakCards.slice(0, 30).map((c) => `${c.word}（${c.meaning}）`);
      const j = parseJSON(await callClaude(
        `日本の高校生が復習で繰り返し「まだ」と答えている（＝覚えられていない）語・用語のリストです（英単語・古文単語・歴史用語など科目が混在している可能性があります）。共通する特徴で2〜4グループに分類し、各グループに語源・イメージ・対比などを使った覚え方のコツを付けてください。
JSONのみ: {"groups":[{"label":"グループ名（15字以内）","words":["単語のみを3〜8個"],"tip":"覚え方のコツ（80字以内）"}],"advice":"全体への一言（60字以内）"}

${sample.join("\n")}`
      ));
      update((d) => { d.ai = d.ai || {}; d.ai.vocabWeak = { date: todayStr(), groups: j.groups || [], advice: j.advice || "" }; return d; });
    } catch (e) { fail(e.message === "NO_KEY" ? "設定（⚙）でAPIキーを登録してください。" : "分析に失敗しました。もう一度お試しください。"); }
    setBusy("");
  };

  /* ----- ④ weekly coach ----- */
  const runCoach = async () => {
    setBusy("coach"); setErr("");
    try {
      const cnt = { 習得: 0, 定着中: 0, 学習中: 0, 苦手: 0, 未学習: 0 };
      let totalW = 0;
      for (const dk of data.decks) for (const c of dk.cards) { cnt[catOf(c)]++; totalW++; }
      const st = data.stats || {};
      const weakList = weakCards.slice(0, 8).map((c) => c.word).join(", ");
      const j = parseJSON(await callClaude(
        `あなたは日本の高校生専門の英語学習コーチです。以下の学習データにもとづき、今週の総評と来週の具体的プランを作ってください。数字に必ず言及し、根拠のない褒め方はしないこと。${(data.goal || goalDraft) ? `生徒の目標「${data.goal || goalDraft}」に沿わせること。` : ""}
JSONのみ: {"summary":"今週の総評（130字以内）","plan":["来週のプラン1（45字以内・数値目標入り）","プラン2","プラン3"],"cheer":"締めの一言（25字以内）"}

学習データ:
- 連続記録 ${st.streak || 0}日 / 累計音読 ${st.totalReads || 0}回 / 教材 ${data.materials.length}冊
- 単語 全${totalW}語（習得${cnt["習得"]}・定着中${cnt["定着中"]}・学習中${cnt["学習中"]}・苦手${cnt["苦手"]}・未学習${cnt["未学習"]}）
- 苦手な単語の例: ${weakList || "なし"}
- 弱点マーク: 聞き取り${agg["聞き取り"].total}・語彙${agg["語彙"].total}・文法${agg["文法"].total}（うち音読で潰した ${done}）`
      ));
      update((d) => { d.ai = d.ai || {}; d.ai.coach = { date: todayStr(), summary: j.summary || "", plan: j.plan || [], cheer: j.cheer || "" }; d.goal = goalDraft.trim(); return d; });
    } catch (e) { fail(e.message === "NO_KEY" ? "設定（⚙）でAPIキーを登録してください。" : "レポート生成に失敗しました。もう一度お試しください。"); }
    setBusy("");
  };

  const secHead = (label) => <div style={{ fontSize: 15, fontWeight: 800, color: C.sub, margin: "20px 0 10px" }}>{label}</div>;

  return (
    <div>
      <H1 eyebrow="分析">総合分析</H1>
      <p style={{ fontSize: 14, color: C.sub, margin: "0 0 10px" }}>マークした弱点と単語の記録をAIが診断し、次にやることまで落とし込みます。</p>
      <div style={{ fontSize: 14, fontWeight: 800, marginBottom: 16 }}>
        {data.materials.length} 教材 <span style={{ color: C.line }}>｜</span> <span style={{ color: C.green }}>{mastered} 習得</span>
      </div>

      {err && <div style={{ background: C.dark, color: C.white, fontSize: 13, fontWeight: 700, borderRadius: 12, padding: "12px 16px", marginBottom: 12 }}>{err}</div>}

      {bestPart ? (
        <Card style={{ marginBottom: 6 }}>
          <div style={{ display: "flex", alignItems: "center", fontSize: 14, fontWeight: 800 }}>
            <span style={{ width: 9, height: 9, borderRadius: "50%", background: C.orange, marginRight: 7 }} />いま潰すべきパート
          </div>
          <div style={{ fontSize: 13, color: C.sub, marginTop: 10 }}>{bestPart.m.category}</div>
          <div style={{ fontSize: 19, fontWeight: 800 }}>{bestPart.m.title}</div>
          <div style={{ fontSize: 14, fontWeight: 800, color: C.orange, margin: "4px 0 10px" }}>PART {bestPart.pi + 1}｜{bestPart.p.title}</div>
          <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 12 }}>
            {bestPart.cnt["語彙"] > 0 && <span style={{ fontSize: 12, fontWeight: 800, color: C.orange, background: C.orangeSoft, borderRadius: 6, padding: "3px 9px" }}>語 {bestPart.cnt["語彙"]}</span>}
            {bestPart.cnt["文法"] > 0 && <span style={{ fontSize: 12, fontWeight: 800, color: C.blue, background: C.blueSoft, borderRadius: 6, padding: "3px 9px" }}>文 {bestPart.cnt["文法"]}</span>}
            {bestPart.cnt["聞き取り"] > 0 && <span style={{ fontSize: 12, fontWeight: 800, color: C.gold, background: C.goldSoft, borderRadius: 6, padding: "3px 9px" }}>聞 {bestPart.cnt["聞き取り"]}</span>}
            <span style={{ fontSize: 13, color: C.sub, fontWeight: 700 }}>弱点 {bestPart.unresolved}箇所</span>
          </div>
          <Btn icon={Volume2} onClick={() => onRead(bestPart.m.id, bestPart.pi)} style={{ width: "100%", justifyContent: "center" }}>音読する →</Btn>
        </Card>
      ) : null}

      {secHead("AI診断")}

      {/* ① pattern diagnosis */}
      <Card style={{ marginBottom: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
          <Sparkles size={16} color={C.orange} />
          <span style={{ fontSize: 15, fontWeight: 800 }}>弱点パターン診断</span>
        </div>
        <div style={{ display: "flex", background: "#E4DCC9", borderRadius: 999, padding: 4, marginBottom: 12 }}>
          {MARK_TYPES.map((t) => (
            <button key={t} onClick={() => setAiTab(t)} style={{
              flex: 1, fontFamily: F, fontSize: 13, fontWeight: 800, padding: "8px 0", borderRadius: 999, border: "none", cursor: "pointer",
              background: aiTab === t ? MARK_COLOR[t] : "transparent", color: aiTab === t ? C.white : C.sub,
            }}>{t} <span style={{ fontSize: 11, opacity: 0.85 }}>{agg[t].total}</span></button>
          ))}
        </div>
        {ai.deep && ai.deep[aiTab] ? (
          <div>
            {(ai.deep[aiTab].trends || []).map((tr, i) => (
              <div key={i} style={{ background: C.soft, borderRadius: 12, padding: "12px 14px", marginBottom: 8 }}>
                <div style={{ fontSize: 14, fontWeight: 800, color: MARK_COLOR[aiTab] }}>傾向{i + 1}．{tr.title}</div>
                <div style={{ fontSize: 13, lineHeight: 1.8, marginTop: 4 }}>{tr.why}</div>
                <div style={{ fontSize: 13, lineHeight: 1.8, marginTop: 4 }}><b>対策：</b>{tr.fix}</div>
              </div>
            ))}
            <div style={{ fontSize: 11, color: C.sub, fontWeight: 700 }}>診断日: {ai.deep[aiTab].date}</div>
          </div>
        ) : (
          <p style={{ fontSize: 13, color: C.sub, lineHeight: 1.8, margin: "0 0 4px" }}>マークした文の実データから、共通する弱点と対策を最大3つ特定します。</p>
        )}
        {busy === "deep" ? <Spin label="実データを診断中…" /> : (
          <Btn small icon={Sparkles} onClick={runDeep} disabled={agg[aiTab].total === 0} style={{ marginTop: 8 }}>
            {agg[aiTab].total === 0 ? `${aiTab}のマークがまだありません` : ai.deep && ai.deep[aiTab] ? "再診断する" : "診断する"}
          </Btn>
        )}
      </Card>

      {/* ③ grammar ranking */}
      <Card style={{ marginBottom: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
          <BarChart3 size={16} color={C.blue} />
          <span style={{ fontSize: 15, fontWeight: 800 }}>文法項目ランキング</span>
        </div>
        {gRank.length > 0 ? (
          <div style={{ marginBottom: 10 }}>
            {gRank.map(([k, v]) => (
              <div key={k} style={{ marginBottom: 10 }}>
                <div style={{ display: "flex", alignItems: "center", fontSize: 13, fontWeight: 800 }}>
                  <span>{k}</span>
                  <span style={{ marginLeft: "auto", color: C.sub }}>{v.total}箇所（潰した {v.done}）</span>
                </div>
                <div style={{ height: 6, background: "#E9E2D2", borderRadius: 3, marginTop: 4 }}>
                  <div style={{ height: 6, width: `${(v.total / gRank[0][1].total) * 100}%`, background: C.blue, borderRadius: 3 }} />
                </div>
              </div>
            ))}
          </div>
        ) : (
          <p style={{ fontSize: 13, color: C.sub, lineHeight: 1.8, margin: "0 0 4px" }}>文法マークした文をAIが「関係詞」「仮定法」などに自動分類し、どの文法を復習すべきかを数字で示します。</p>
        )}
        {busy === "gram" ? <Spin label={`文法項目を分類中…`} /> : (
          <Btn small icon={Sparkles} onClick={runClassify} disabled={unclassified.length === 0} style={{ marginTop: 4 }}>
            {unclassified.length === 0 ? (gRank.length ? "分類済み" : "文法マークがまだありません") : `AIで分類（未分類 ${unclassified.length}件）`}
          </Btn>
        )}
      </Card>

      {/* weak-word clustering */}
      <Card style={{ marginBottom: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
          <BookOpen size={16} color={CAT_COLOR["苦手"]} />
          <span style={{ fontSize: 15, fontWeight: 800 }}>覚えられていない単語の分析</span>
          <span style={{ marginLeft: "auto", fontSize: 13, fontWeight: 800, color: CAT_COLOR["苦手"] }}>苦手 {weakCards.length}語</span>
        </div>
        {ai.vocabWeak ? (
          <div>
            {(ai.vocabWeak.groups || []).map((g, i) => (
              <div key={i} style={{ background: C.soft, borderRadius: 12, padding: "12px 14px", marginBottom: 8 }}>
                <div style={{ fontSize: 14, fontWeight: 800 }}>{g.label}</div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", margin: "6px 0" }}>
                  {(g.words || []).map((wd, k) => (
                    <button key={k} onClick={() => speakEn(wd)} style={{ fontFamily: F, fontSize: 12, fontWeight: 800, padding: "4px 10px", borderRadius: 999, border: `1px solid ${C.line}`, background: C.white, color: C.ink, cursor: "pointer" }}>{wd} 🔊</button>
                  ))}
                </div>
                <div style={{ fontSize: 13, lineHeight: 1.8 }}><b>コツ：</b>{g.tip}</div>
              </div>
            ))}
            {ai.vocabWeak.advice && <p style={{ fontSize: 13, lineHeight: 1.8, margin: "4px 0" }}>{ai.vocabWeak.advice}</p>}
            <div style={{ fontSize: 11, color: C.sub, fontWeight: 700 }}>分析日: {ai.vocabWeak.date}</div>
          </div>
        ) : (
          <p style={{ fontSize: 13, color: C.sub, lineHeight: 1.8, margin: "0 0 4px" }}>復習で「まだ」が続いている単語をAIがグループ分けし、それぞれに覚え方のコツを付けます。</p>
        )}
        {busy === "vocab" ? <Spin label="苦手単語を分析中…" /> : (
          <Btn small icon={Sparkles} onClick={runVocabWeak} disabled={weakCards.length === 0} style={{ marginTop: 8 }}>
            {weakCards.length === 0 ? "苦手単語がまだありません（復習すると溜まります）" : ai.vocabWeak ? "再分析する" : "分析する"}
          </Btn>
        )}
      </Card>

      {/* ④ weekly coach */}
      <Card style={{ marginBottom: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
          <GraduationCap size={16} color={C.gold} />
          <span style={{ fontSize: 15, fontWeight: 800 }}>AIコーチ・週次レポート</span>
        </div>
        <input value={goalDraft} onChange={(e) => setGoalDraft(e.target.value)} placeholder="目標（例：英検準1級・慶應FIT）を入れると助言が具体的に"
          style={{ width: "100%", fontSize: 13, padding: "10px 14px", border: `1px solid ${C.line}`, borderRadius: 10, background: C.white, marginBottom: 10, boxSizing: "border-box" }} />
        {ai.coach ? (
          <div>
            <div style={{ background: C.soft, borderRadius: 12, padding: "12px 14px", marginBottom: 8 }}>
              <div style={{ fontSize: 13, fontWeight: 800, color: C.gold, marginBottom: 4 }}>今週の総評（{ai.coach.date}）</div>
              <div style={{ fontSize: 13, lineHeight: 1.9 }}>{ai.coach.summary}</div>
            </div>
            <div style={{ background: C.soft, borderRadius: 12, padding: "12px 14px", marginBottom: 8 }}>
              <div style={{ fontSize: 13, fontWeight: 800, color: C.gold, marginBottom: 4 }}>来週のプラン</div>
              {(ai.coach.plan || []).map((p, i) => (
                <div key={i} style={{ fontSize: 13, lineHeight: 1.9 }}>{i + 1}．{p}</div>
              ))}
            </div>
            {ai.coach.cheer && <div style={{ fontSize: 14, fontWeight: 800, textAlign: "center", margin: "10px 0 4px" }}>「{ai.coach.cheer}」</div>}
          </div>
        ) : (
          <p style={{ fontSize: 13, color: C.sub, lineHeight: 1.8, margin: "0 0 4px" }}>音読・単語・弱点の全データから、今週の総評と来週の数値目標つきプランを作ります。週1回の生成がおすすめ。</p>
        )}
        {busy === "coach" ? <Spin label="学習データからレポートを作成中…" /> : (
          <Btn small icon={Sparkles} onClick={runCoach} style={{ marginTop: 8 }}>{ai.coach ? "新しいレポートを生成" : "レポートを生成"}</Btn>
        )}
      </Card>

      {secHead("単語の習熟（全単語帳）")}
      <Card style={{ marginBottom: 20 }}>
        {(() => {
          const cnt = { 習得: 0, 定着中: 0, 学習中: 0, 苦手: 0, 未学習: 0 };
          let totalW = 0;
          for (const dk of data.decks) for (const c of dk.cards) { cnt[catOf(c)]++; totalW++; }
          if (!totalW) return <p style={{ fontSize: 14, color: C.sub, margin: 0 }}>単語帳を追加すると、ここに習熟状況が表示されます。</p>;
          return (
            <>
              <div style={{ display: "flex", alignItems: "baseline" }}>
                <span style={{ fontSize: 40, fontWeight: 800 }}>{cnt["習得"]}</span>
                <span style={{ fontSize: 15, color: C.sub, fontWeight: 700 }}> / {totalW}語 習得</span>
                <span style={{ marginLeft: "auto", fontSize: 30, fontWeight: 800, color: CAT_COLOR["習得"] }}>{Math.round((cnt["習得"] / totalW) * 100)}%</span>
              </div>
              <div style={{ marginTop: 12 }}>
                {["習得", "定着中", "学習中", "苦手", "未学習"].map((k) => (
                  <div key={k} style={{ marginBottom: 10 }}>
                    <div style={{ display: "flex", alignItems: "center", fontSize: 13, fontWeight: 800 }}>
                      <span style={{ width: 10, height: 10, borderRadius: 3, background: CAT_COLOR[k], marginRight: 8 }} />{k}
                      <span style={{ marginLeft: "auto", color: C.sub }}>{cnt[k]}語（{Math.round((cnt[k] / totalW) * 100)}%）</span>
                    </div>
                    <div style={{ height: 6, background: "#E9E2D2", borderRadius: 3, marginTop: 4 }}>
                      <div style={{ height: 6, width: `${(cnt[k] / totalW) * 100}%`, background: CAT_COLOR[k], borderRadius: 3 }} />
                    </div>
                  </div>
                ))}
              </div>
              <div style={{ borderTop: `1px solid ${C.line}`, paddingTop: 12 }}>
                {data.decks.map((dk) => {
                  const dDone = dk.cards.filter((c) => catOf(c) === "習得").length;
                  return (
                    <div key={dk.id} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, fontWeight: 700, marginBottom: 7 }}>
                      <span style={{ width: 10, height: 10, borderRadius: 3, background: dk.color, flexShrink: 0 }} />
                      <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: 140 }}>{dk.name}</span>
                      <div style={{ flex: 1, height: 5, background: "#E9E2D2", borderRadius: 3 }}>
                        <div style={{ height: 5, width: `${dk.cards.length ? (dDone / dk.cards.length) * 100 : 0}%`, background: dk.color, borderRadius: 3 }} />
                      </div>
                      <span style={{ color: C.sub, flexShrink: 0 }}>{dk.cards.length ? Math.round((dDone / dk.cards.length) * 100) : 0}%</span>
                    </div>
                  );
                })}
              </div>
            </>
          );
        })()}
      </Card>

      {secHead("弱点を音読で潰した割合")}
      <Card style={{ marginBottom: 20 }}>
        <div style={{ display: "flex", alignItems: "baseline" }}>
          <span style={{ fontSize: 40, fontWeight: 800 }}>{done}</span>
          <span style={{ fontSize: 15, color: C.sub, fontWeight: 700 }}> / {total}箇所</span>
          <span style={{ marginLeft: "auto", fontSize: 30, fontWeight: 800, color: C.orange }}>{total ? Math.round((done / total) * 100) : 0}%</span>
        </div>
        <div style={{ fontSize: 13, color: C.sub, marginBottom: 14 }}>音読で潰した分がここに積み上がります。</div>
        {MARK_TYPES.map((t) => (
          <div key={t} style={{ marginBottom: 12 }}>
            <div style={{ display: "flex", alignItems: "center", fontSize: 14, fontWeight: 800 }}>
              <span style={{ width: 11, height: 11, borderRadius: 3, background: MARK_COLOR[t], marginRight: 8 }} />{t}
              <span style={{ marginLeft: "auto", color: C.sub, fontWeight: 700, fontSize: 13 }}>{agg[t].total}箇所中 {agg[t].done}</span>
              <span style={{ width: 52, textAlign: "right", color: MARK_COLOR[t] }}>{agg[t].total ? Math.round((agg[t].done / agg[t].total) * 100) : 0}%</span>
            </div>
            <div style={{ height: 6, background: "#E9E2D2", borderRadius: 3, marginTop: 5 }}>
              <div style={{ height: 6, width: `${agg[t].total ? (agg[t].done / agg[t].total) * 100 : 0}%`, background: MARK_COLOR[t], borderRadius: 3 }} />
            </div>
          </div>
        ))}
      </Card>
    </div>
  );
}


/* ---------- settings ---------- */
function SettingsModal({ onClose }) {
  const [k, setK] = useState(localStorage.getItem("sf2:apikey") || "");
  const save = () => { localStorage.setItem("sf2:apikey", k.trim()); onClose(); };
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(30,25,20,.45)", zIndex: 50, display: "grid", placeItems: "center", padding: 18 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: C.card, borderRadius: 20, padding: 22, width: "100%", maxWidth: 460, maxHeight: "85vh", overflowY: "auto" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
          <SettingsIcon size={18} color={C.ink} />
          <span style={{ fontSize: 18, fontWeight: 800 }}>設定</span>
          <button onClick={onClose} style={{ marginLeft: "auto", background: C.soft, border: "none", borderRadius: "50%", width: 32, height: 32, cursor: "pointer", display: "grid", placeItems: "center" }}><X size={15} /></button>
        </div>
        <div style={{ fontSize: 14, fontWeight: 800, margin: "10px 0 6px" }}>Gemini APIキー（AI機能に必要）</div>
        <input value={k} onChange={(e) => setK(e.target.value)} placeholder="AIza..." style={{ width: "100%", fontSize: 14, fontFamily: "monospace", padding: "11px 14px", border: `1px solid ${C.line}`, borderRadius: 10, background: C.white, boxSizing: "border-box" }} />
        <p style={{ fontSize: 12, color: C.sub, lineHeight: 1.8, margin: "10px 0 14px" }}>
          キーは <a href="https://aistudio.google.com/apikey" target="_blank" rel="noreferrer" style={{ color: C.orange, fontWeight: 800 }}>Google AI Studio</a> で無料発行できます。キーはこの端末のブラウザ内にだけ保存されます。
        </p>
        <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
          <Btn small onClick={save}>保存する</Btn>
          <Btn small kind="ghost" onClick={() => { localStorage.removeItem("sf2:apikey"); setK(""); }}>キーを削除</Btn>
        </div>
        <div style={{ borderTop: `1px solid ${C.line}`, paddingTop: 14 }}>
          <div style={{ fontSize: 14, fontWeight: 800, marginBottom: 6 }}>発音の音量について</div>
          <p style={{ fontSize: 12, color: C.sub, lineHeight: 1.8, margin: "0 0 10px" }}>
            発音は端末の「<b>メディア音量</b>」で再生されます（着信音量とは別）。小さいときは、下のテストを再生しながら音量ボタンで上げてください。
          </p>
          <Btn small kind="ghost" icon={Volume2} onClick={() => speakEn("This is a pronunciation test. Can you hear me clearly?")}>テスト再生</Btn>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
