const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
};
const addDays = (iso, n) => {
  const d = new Date(iso + "T00:00:00");
  d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
};

const getApiKey = () => (localStorage.getItem("sf2:apikey") || "").trim();

  const key = getApiKey();
  if (!key) throw new Error("NO_KEY");

  if (imageData) parts.push({ inline_data: { mime_type: imageData.type, data: imageData.data } });
  parts.push({ text: prompt });
  const models = ["gemini-2.5-flash", "gemini-2.0-flash"];
  let lastErr = null;
  for (const m of models) {
    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${encodeURIComponent(key)}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ contents: [{ parts }] }),
      });
      if (!res.ok) { lastErr = new Error("HTTP " + res.status); continue; }
      const data = await res.json();
      const out = (((data.candidates || [])[0] || {}).content || {}).parts || [];
      const text = out.map((p) => p.text || "").join("");
      if (text) return text;
      lastErr = new Error("empty response");
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error("AI request failed");
}

function parseJSON(text) {
  const clean = text.replace(/```json|```/g, "").trim();
  return JSON.parse(clean.slice(clean.indexOf("{"), clean.lastIndexOf("}") + 1));
}
function chunkText(text) {
  const parts = text.replace(/\s+/g, " ").match(/[^.!?]+[.!?]+["')\]]?\s*|[^.!?]+$/g) || [text];
  const chunks = [];
  let cur = "";
  for (const p of parts) {
    if ((cur + p).length > 650 && cur) { chunks.push(cur.trim()); cur = p; }
    else cur += p;
  }
  if (cur.trim()) chunks.push(cur.trim());
  return chunks;
}

/* CSV/TSV parsing for vocab import */
function parseCSVLine(line, delim) {
  const out = [];
  let cur = "", q = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (q) {
      if (ch === '"') { if (line[i + 1] === '"') { cur += '"'; i++; } else q = false; }
      else cur += ch;
    } else if (ch === '"') q = true;
    else if (ch === delim) { out.push(cur); cur = ""; }
    else cur += ch;
  }
  out.push(cur);
  return out.map((s) => s.trim());
}
function parseCards(text) {
  const lines = (text || "").split(/\r?\n/).map((l) => l.trim()).filter(Boolean);
  if (!lines.length) return [];
  const mk = (word, meaning, example) => ({ word: (word || "").trim(), meaning: (meaning || "").trim(), example: (example || "").trim(), pos: "", tag: "", level: 0, due: todayStr() });
  const splitEx = (c) => {
    if (!c.example && c.meaning.includes(" / ")) {
      const p = c.meaning.split(" / ");
      c.meaning = p[0].trim();
      c.example = p.slice(1).join(" / ").trim();
    }
    return c;
  };
  const strategies = [];
  // 1) tab-separated
  strategies.push(lines.map((l) => {
    if (!l.includes("\t")) return null;
    const cols = l.split("\t").map((s) => s.trim());
    if (cols.length < 2 || !cols[0] || !cols[1]) return null;
    return splitEx(mk(cols[0], cols[1], cols.slice(2).filter(Boolean).join(" / ")));
  }));
  // 2) comma / semicolon CSV (quote-aware)
  for (const delim of [",", ";"]) {
    strategies.push(lines.map((l) => {
      if (!l.includes(delim)) return null;
      const cols = parseCSVLine(l, delim);
      if (cols.length < 2 || !cols[0] || !cols[1]) return null;
      return splitEx(mk(cols[0], cols[1], cols.slice(2).filter(Boolean).join(" / ")));
    }));
  }
  // 3) colon format: "word: 意味" (left side must be latin, not Japanese)
  strategies.push(lines.map((l) => {
    const m = l.match(/^(.{1,60}?)\s*[:：]\s*(.+)$/);
    if (!m) return null;
    const w = m[1].trim();
    if (!/[a-zA-Z]/.test(w) || /[\u3040-\u30ff\u4e00-\u9fff]/.test(w)) return null;
    return splitEx(mk(w, m[2]));
  }));
  // 4) generic colon: front may be Japanese (古文単語・日本史など)
  strategies.push(lines.map((l) => {
    const m = l.match(/^(.{1,60}?)\s*[:：]\s*(.+)$/);
    if (!m) return null;
    const w = m[1].trim();
    if (!w || /[:：]$/.test(w)) return null;
    return splitEx(mk(w, m[2]));
  }));
  // 5) first-whitespace fallback (lowest priority)
  strategies.push(lines.map((l) => {
    const m = l.match(/^(\S{1,40})[\s\u3000]+(.+)$/);
    if (!m) return null;
    return splitEx(mk(m[1], m[2]));
  }));
  // pick the strategy that yields the most valid cards
  let best = [];
  for (const st of strategies) {
    const cards = st.filter((c) => c && c.word && c.meaning);
    if (cards.length > best.length) best = cards;
  }
  if (!best.length) return [];
  // drop a header row if present
  const heads = ["word", "front", "term", "english", "meaning", "back", "definition", "japanese"];
  const jheads = ["単語", "英語", "意味", "訳", "日本語", "表", "裏", "表面", "裏面"];
  const h = best[0];
  if (heads.includes(h.word.toLowerCase()) || jheads.includes(h.word) || heads.includes(h.meaning.toLowerCase()) || jheads.includes(h.meaning)) best = best.slice(1);
  // dedupe by word
  const seen = new Set();
  return best.filter((c) => { const k = c.word.toLowerCase(); if (seen.has(k)) return false; seen.add(k); return true; });
}

      const b64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(",")[1]);
        r.onerror = () => rej();
        r.readAsDataURL(file);
      });
      const out = await callClaude("この画像に写っている英文をそのまま書き起こしてください。英文のみを出力。", { type: file.type, data: b64 });
      setText((t) => (t ? t + "\n" + out.trim() : out.trim()));
    } catch { setError("写真の読み取りに失敗しました。"); }
    setBusy(false); setStep("");
  };

  const analyze = async () => {
    setError(""); setBusy(true);
    try {
      const chunks = chunkText(text);
      const parts = [];
      let vocab = [];
      for (let i = 0; i < chunks.length; i++) {
        setStep(`パート ${i + 1}/${chunks.length} を分析中…`);
        const j = parseJSON(await callClaude(
          `あなたは日本の高校英語教師です。次の英文を文単位に分割し、各文の自然な日本語訳を作成。このパートの内容を表す短い日本語見出しも付け、高校生に重要な単語・熟語を最大7個抽出してください。
必ずこのJSON形式のみで出力（コードブロック記号なし）:
{"partTitle":"短い日本語見出し","sentences":[{"en":"英文","ja":"訳"}],"vocab":[{"word":"語","pos":"品詞","meaning":"意味","example":"短い例文"}]}

英文:
${chunks[i]}`
        ));
        parts.push({ title: j.partTitle || `パート${i + 1}`, sentences: (j.sentences || []).map((s) => ({ ...s, read: 0, marks: {} })) });
        vocab = vocab.concat(j.vocab || []);
      }
      const seen = new Set();
      vocab = vocab.filter((v) => { const k = v.word.toLowerCase(); if (seen.has(k)) return false; seen.add(k); return true; });

      setStep("タイトルを付けています…");
      let meta = { title: "New Material", titleJa: "新しい教材", category: "英語" };
      try {
        meta = { ...meta, ...parseJSON(await callClaude(`次の英文に、英語タイトル・日本語タイトル・「社会学／旅行とアクセシビリティ」のような分野タグを付けてください。JSONのみ: {"title":"...","titleJa":"...","category":"..."}\n\n${text.slice(0, 500)}`)) };
      } catch {}

      const deckId = uid();
      const material = { id: uid(), ...meta, parts, deckId };
      const deck = {
        id: deckId, name: meta.title, color: DECK_COLORS[Math.floor(Math.random() * DECK_COLORS.length)],
        cards: vocab.map((v) => ({ ...v, tag: "", level: 0, due: todayStr() })),
      };
      onDone(material, deck);
    } catch { setError("分析に失敗しました。英文を短くして再度お試しください。"); }
    setBusy(false); setStep("");
  };

  return (
    <div>
      <button onClick={onCancel} style={{ background: "none", border: "none", color: C.sub, fontFamily: F, fontSize: 14, fontWeight: 700, cursor: "pointer", padding: 0, marginBottom: 10, display: "flex", alignItems: "center", gap: 4 }}><ChevronLeft size={16} />もどる</button>
      <H1>新しい教材</H1>
      <p style={{ fontSize: 14, color: C.sub, margin: "0 0 14px" }}>英文を貼り付けるか、教科書の写真から読み取ります。パート分割・対訳・単語帳を自動作成します。</p>
      <textarea value={text} onChange={(e) => setText(e.target.value)} rows={10} placeholder="ここに英文を貼り付け…"
        style={{ width: "100%", fontSize: 14, lineHeight: 1.8, padding: 16, border: `1px solid ${C.line}`, borderRadius: 14, background: C.card, color: C.ink, resize: "vertical" }} />
      <div style={{ display: "flex", gap: 10, marginTop: 12, flexWrap: "wrap", alignItems: "center" }}>
        <label style={{ display: "inline-flex", alignItems: "center", gap: 6, fontFamily: F, fontWeight: 700, fontSize: 15, padding: "12px 20px", borderRadius: 999, border: `1px solid ${C.line}`, background: C.white, color: C.ink, cursor: "pointer", opacity: busy ? 0.45 : 1 }}>
          <Download size={16} />写真から読み取る
          <input type="file" accept="image/*" style={{ display: "none" }} disabled={busy} onChange={(e) => { if (e.target.files[0]) handleImage(e.target.files[0]); e.target.value = ""; }} />
        </label>
        <Btn onClick={analyze} disabled={busy || text.trim().length < 20} icon={Sparkles}>教材を作成</Btn>
      </div>
      {busy && <Spin label={step} />}
      {error && <p style={{ fontSize: 13, color: C.orange, fontWeight: 700 }}>{error}</p>}
    </div>
  );
}

/* ================= MATERIAL ================= */
function MaterialScreen({ data, material, update, onBack, onRead }) {
  const [openPart, setOpenPart] = useState(null);
  const [sel, setSel] = useState(null);
  const [explain, setExplain] = useState({});
  const [busyKey, setBusyKey] = useState(null);

  const toggleMark = (pi, si, type) => update((d) => {
    const s = d.materials.find((m) => m.id === material.id).parts[pi].sentences[si];
    s.marks[type] = !s.marks[type];
    return d;
  });
  const askExplain = async (pi, si, type) => {
    const key = `${pi}-${si}`;
    setBusyKey(key);
    const s = material.parts[pi].sentences[si];
    try {
      const out = await callClaude(`あなたは日本の高校英語教師です。次の英文について「${type}」の観点から高校生向けに日本語で簡潔に（200字以内）解説してください。\n英文: ${s.en}\n訳: ${s.ja}`);
      setExplain((p) => ({ ...p, [key]: out.trim() }));
    } catch { setExplain((p) => ({ ...p, [key]: "解説の取得に失敗しました。" })); }
    setBusyKey(null);
  };

  return (
    <div>
      <button onClick={openPart === null ? onBack : () => { setOpenPart(null); setSel(null); }} style={{ background: "none", border: "none", color: C.sub, fontFamily: F, fontSize: 14, fontWeight: 700, cursor: "pointer", padding: 0, marginBottom: 10, display: "flex", alignItems: "center", gap: 4 }}><ChevronLeft size={16} />{openPart === null ? "本棚へ" : "パート一覧へ"}</button>
      <div style={{ fontSize: 13, color: C.blue, fontWeight: 700 }}>{material.category}</div>
      <h1 style={{ fontSize: 24, fontWeight: 800, margin: "2px 0" }}>{material.title}</h1>
      <p style={{ fontSize: 13, color: C.sub, margin: "0 0 16px" }}>{material.titleJa}</p>

      {openPart === null ? (
        <div style={{ display: "grid", gap: 12 }}>
          {material.parts.map((p, pi) => {
            const read = p.sentences.filter((s) => s.read > 0).length;
            const marks = p.sentences.reduce((n, s) => n + Object.values(s.marks).filter(Boolean).length, 0);
            return (
              <Card key={pi}>
                <div style={{ fontSize: 14, fontWeight: 800, color: C.orange }}>PART {pi + 1}｜{p.title}</div>
                <div style={{ fontSize: 13, color: C.sub, margin: "4px 0 10px" }}>{p.sentences.length}文 ・ 弱点マーク {marks}箇所 ・ 音読 {read}/{p.sentences.length}文</div>
                <div style={{ height: 6, background: "#E9E2D2", borderRadius: 3, marginBottom: 12 }}>
                  <div style={{ height: 6, width: `${Math.round((read / p.sentences.length) * 100)}%`, background: C.blue, borderRadius: 3 }} />
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <Btn small kind="ghost" onClick={() => setOpenPart(pi)}>対訳をひらく</Btn>
                  <Btn small icon={Volume2} onClick={() => onRead(pi)}>音読する</Btn>
                </div>
              </Card>
            );
          })}
        </div>
      ) : (
        <div>
          <div style={{ fontSize: 15, fontWeight: 800, color: C.orange, marginBottom: 10 }}>PART {openPart + 1}｜{material.parts[openPart].title}</div>
          <div style={{ display: "grid", gap: 2 }}>
            {material.parts[openPart].sentences.map((s, si) => {
              const key = `${openPart}-${si}`;
              const active = sel === si;
              const markList = MARK_TYPES.filter((t) => s.marks[t]);
              return (
                <div key={si}>
                  <div onClick={() => setSel(active ? null : si)} style={{ background: active ? C.soft : C.card, borderRadius: active ? "14px 14px 0 0" : 14, padding: "14px 16px", cursor: "pointer", marginBottom: active ? 0 : 6 }}>
                    <div style={{ fontSize: 16, lineHeight: 1.75, fontWeight: 600 }}>
                      {markList.map((t) => <span key={t} style={{ fontSize: 10, fontWeight: 800, color: C.white, background: MARK_COLOR[t], borderRadius: 4, padding: "2px 6px", marginRight: 6, verticalAlign: "middle" }}>{t}</span>)}
                      {s.en}
                      {s.read > 0 && <span style={{ fontSize: 11, color: C.green, fontWeight: 800, marginLeft: 8 }}>音読{s.read}回</span>}
                    </div>
                    <div style={{ fontSize: 13, color: C.sub, lineHeight: 1.7, marginTop: 4 }}>{s.ja}</div>
                  </div>
                  {active && (
                    <div style={{ background: C.card, borderRadius: "0 0 14px 14px", padding: "12px 16px", marginBottom: 6, borderTop: `1px dashed ${C.line}` }}>
                      <div style={{ fontSize: 12, color: C.sub, marginBottom: 8, fontWeight: 700 }}>弱点をマーク → AIが解説 → 音読で潰す</div>
                      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                        {MARK_TYPES.map((t) => (
                          <button key={t} onClick={() => { toggleMark(openPart, si, t); if (!s.marks[t]) askExplain(openPart, si, t); }} style={{
                            fontFamily: F, fontSize: 13, fontWeight: 800, padding: "7px 14px", borderRadius: 999, cursor: "pointer",
                            border: `1.5px solid ${MARK_COLOR[t]}`,
                            background: s.marks[t] ? MARK_COLOR[t] : C.white, color: s.marks[t] ? C.white : MARK_COLOR[t],
                          }}>{t}</button>
                        ))}
                      </div>
                      {busyKey === key && <Spin label="解説を作成中…" />}
                      {explain[key] && <p style={{ fontSize: 13, lineHeight: 1.8, marginTop: 10, whiteSpace: "pre-wrap" }}>{explain[key]}</p>}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ================= READING MODE ================= */
function ReadingMode({ data, update, target, onClose }) {
  const mat = data.materials.find((m) => m.id === target.matId);
  const part = mat && mat.parts[target.partIdx];
  const [idx, setIdx] = useState(0);
  const [showJa, setShowJa] = useState(false);
  if (!part) return null;
  const s = part.sentences[idx];
  const done = idx >= part.sentences.length;

  const readIt = () => {
    update((d) => {
      const sent = d.materials.find((m) => m.id === target.matId).parts[target.partIdx].sentences[idx];
      sent.read = (sent.read || 0) + 1;
      const t = todayStr();
      const st = d.stats;
      if (st.todayKey !== t) { st.todayKey = t; st.readToday = 0; }
      st.readToday++; st.totalReads = (st.totalReads || 0) + 1;
      if (st.readToday >= 5 && st.goalDate !== t) {
        st.streak = st.goalDate === addDays(t, -1) ? (st.streak || 0) + 1 : 1;
        st.goalDate = t;
      }
      return d;
    });
    setShowJa(false);
    setIdx(idx + 1);
  };

  return (
    <div style={{ minHeight: "80vh", display: "flex", flexDirection: "column" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 20 }}>
        <button onClick={onClose} style={{ background: C.white, border: "none", borderRadius: "50%", width: 38, height: 38, cursor: "pointer", display: "grid", placeItems: "center" }}><X size={18} /></button>
        <div style={{ fontSize: 13, fontWeight: 800, color: C.orange }}>音読モード ・ PART {target.partIdx + 1}</div>
        <div style={{ marginLeft: "auto", fontSize: 13, fontWeight: 800, color: C.sub }}>{Math.min(idx + 1, part.sentences.length)} / {part.sentences.length}</div>
      </div>
      <div style={{ height: 6, background: "#E9E2D2", borderRadius: 3, marginBottom: 26 }}>
        <div style={{ height: 6, width: `${(idx / part.sentences.length) * 100}%`, background: C.orange, borderRadius: 3, transition: "width .2s" }} />
      </div>

      {done ? (
        <Card style={{ textAlign: "center", padding: 40 }}>
          <div style={{ fontSize: 42 }}>🎉</div>
          <div style={{ fontSize: 22, fontWeight: 800, margin: "8px 0" }}>パート完了！</div>
          <div style={{ fontSize: 14, color: C.sub, marginBottom: 18 }}>{part.sentences.length}文を音読しました。忘却の前に、明日もう一度。</div>
          <Btn onClick={onClose}>おわる</Btn>
        </Card>
      ) : (
        <>
          <Card style={{ padding: 26, flex: "0 0 auto" }}>
            <div style={{ fontSize: 22, lineHeight: 1.8, fontWeight: 700 }}>{s.en}</div>
            <div onClick={() => setShowJa(!showJa)} style={{ marginTop: 18, fontSize: 15, lineHeight: 1.8, color: showJa ? C.sub : "transparent", background: showJa ? "none" : C.soft, borderRadius: 8, padding: "6px 10px", cursor: "pointer", userSelect: showJa ? "auto" : "none" }}>
              {showJa ? s.ja : "タップして訳を表示"}
            </div>
          </Card>
          <div style={{ marginTop: 16 }}>
            <div style={{ fontSize: 12, color: C.sub, fontWeight: 700, marginBottom: 8 }}>つまずいたら弱点マーク：</div>
            <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
              {MARK_TYPES.map((t) => (
                <button key={t} onClick={() => update((d) => {
                  const sent = d.materials.find((m) => m.id === target.matId).parts[target.partIdx].sentences[idx];
                  sent.marks[t] = !sent.marks[t];
                  return d;
                })} style={{
                  fontFamily: F, fontSize: 13, fontWeight: 800, padding: "8px 15px", borderRadius: 999, cursor: "pointer",
                  border: `1.5px solid ${MARK_COLOR[t]}`, background: s.marks[t] ? MARK_COLOR[t] : C.white, color: s.marks[t] ? C.white : MARK_COLOR[t],
                }}>{t}</button>
              ))}
            </div>
            <Btn onClick={readIt} icon={Volume2} style={{ width: "100%", justifyContent: "center", padding: "16px 20px", fontSize: 17 }}>声に出して読んだ → 次へ</Btn>
          </div>
        </>
      )}
    </div>
  );
}

/* ================= VOCAB ================= */
function VocabTab({ data, update, dueCount, onOpenDeck, onReview, onWeakLoop }) {
  const [mode, setMode] = useState(""); // "" | "create" | "import"
  const [name, setName] = useState("");
  const [color, setColor] = useState(DECK_COLORS[0]);
  const [importText, setImportText] = useState("");
  const [subj, setSubj] = useState("en"); // "en" | "ja"
  const [tagging, setTagging] = useState("");
  const [msg, setMsg] = useState("");
  const [buMode, setBuMode] = useState(""); // "" | "export" | "import"
  const [buText, setBuText] = useState("");
  const fileRef = useRef(null);

  const untagged = data.decks.flatMap((d) => (d.subject || "en") === "en" ? d.cards.filter((c) => !c.tag).map((c) => ({ deckId: d.id, word: c.word })) : []);
  const totalWords = data.decks.reduce((n, d) => n + d.cards.length, 0);
  const preview = mode === "import" ? parseCards(importText) : [];

  const flash = (m) => { setMsg(m); setTimeout(() => setMsg(""), 3500); };

  const readFile = (file) => {
    const r = new FileReader();
    r.onload = () => {
      setImportText(String(r.result || ""));
      if (!name.trim()) setName(file.name.replace(/\.(csv|tsv|txt)$/i, ""));
    };
    r.onerror = () => flash("ファイルを読み込めませんでした。");
    r.readAsText(file);
  };

  const runTagging = async () => {
    const all = [];
    for (let i = 0; i < untagged.length; i += 25) all.push(untagged.slice(i, i + 25));
    const batches = all.slice(0, 8); // 200語ずつ、押すたびに続きから
    for (let i = 0; i < batches.length; i++) {
      setTagging(`試験タグを判定中… (${i + 1}/${batches.length})`);
      try {
        const words = batches[i].map((x) => x.word);
        const j = parseJSON(await callClaude(
          `次の英単語それぞれについて「TOEFL / TOEIC / 英検 / 大学受験」のうち最も効く試験を1つ判定してください。JSONのみ: {"tags":{"単語":"試験名",...}}\n\n${words.join(", ")}`
        ));
        update((d) => {
          for (const deck of d.decks) for (const c of deck.cards) if (j.tags && j.tags[c.word]) c.tag = j.tags[c.word];
          return d;
        });
      } catch {}
    }
    setTagging("");
    const left = Math.max(untagged.length - batches.length * 25, 0);
    flash(left > 0 ? `200語にタグを付与しました。のこり約${left}語は、もう一度ボタンで続きから。` : "試験タグを付与しました。");
  };

  const createDeck = () => {
    if (!name.trim()) { flash("単語帳の名前を入力してください。"); return; }
    const nm = name.trim();
    update((d) => { d.decks.unshift({ id: uid(), name: nm, color, subject: subj, cards: [] }); return d; });
    flash(`「${nm}」を作成しました。開いてカードを追加できます。`);
    setName(""); setMode("");
  };

  const importDeck = () => {
    // NEON CARD のバックアップJSONをそのまま取り込み対応
    try {
      const j = JSON.parse(importText);
      if (j && j.meta && j.decks) {
        const newDecks = j.meta.map((m, i) => ({
          id: uid(),
          name: m.name || `取り込んだ帖${i + 1}`,
          color: DECK_COLORS[i % DECK_COLORS.length],
          subject: subj,
          cards: (((j.decks[m.id] || {}).cards) || [])
            .filter((c) => c && c.q && c.a && c.q.type === "text" && c.a.type === "text")
            .map((c) => ({ word: String(c.q.content || "").trim(), meaning: String(c.a.content || "").trim(), example: "", pos: "", tag: "", level: 0, due: todayStr() }))
            .filter((c) => c.word && c.meaning),
        })).filter((dk) => dk.cards.length);
        if (newDecks.length) {
          update((d) => { d.decks = [...newDecks, ...d.decks]; return d; });
          flash(`NEON CARDから ${newDecks.length}冊（計${newDecks.reduce((n, x) => n + x.cards.length, 0)}枚）を取り込みました。`);
          setImportText(""); setName(""); setMode("");
          return;
        }
      }
    } catch {}
    const cards = parseCards(importText);
    if (!cards.length) { flash("カードを読み取れませんでした。区切り（タブ・カンマ・コロン）をご確認ください。"); return; }
    const nm = name.trim() || "取り込んだ単語帳";
    update((d) => { d.decks.unshift({ id: uid(), name: nm, color, subject: subj, cards }); return d; });
    flash(`「${nm}」に ${cards.length} 語を取り込みました。`);
    setImportText(""); setName(""); setMode("");
  };

  const addPreset = (p) => {
    update((d) => {
      d.decks.unshift({ id: uid(), name: p.name, color: p.color, cards: p.words.map((x) => ({ word: x[0], meaning: x[1], example: x[2] || "", pos: "", tag: "", level: 0, due: todayStr() })) });
      return d;
    });
    flash(`「${p.name}」（${p.words.length}語）を追加しました。`);
  };
  const presetsLeft = PRESET_DECKS.filter((p) => !data.decks.some((d) => d.name === p.name));
  const tagCounts = {};
  for (const dk of data.decks) for (const c of dk.cards) if (c.tag) tagCounts[c.tag] = (tagCounts[c.tag] || 0) + 1;

  const copyBackup = async () => {
    const txt = JSON.stringify(data);
    try { await navigator.clipboard.writeText(txt); flash("バックアップをコピーしました。メモ帳などに保存してください。"); setBuMode(""); }
    catch { setBuText(txt); setBuMode("export"); }
  };
  const restoreBackup = () => {
    try {
      const parsed = JSON.parse(buText);
      if (!parsed || !Array.isArray(parsed.decks) || !Array.isArray(parsed.materials)) throw new Error("bad");
      update(() => ({ ...EMPTY, ...parsed }));
      flash("データを復元しました。");
      setBuMode(""); setBuText("");
    } catch { flash("復元できませんでした。バックアップの全文を貼り付けてください。"); }
  };

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <H1>単語帳</H1>
        <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
          <Btn small kind="ghost" icon={Download} onClick={() => setMode(mode === "import" ? "" : "import")}>取り込む</Btn>
          <Btn small kind="dark" icon={Plus} onClick={() => setMode(mode === "create" ? "" : "create")}>作成</Btn>
        </div>
      </div>
      <p style={{ fontSize: 14, color: C.sub, margin: "0 0 12px" }}>英単語だけでなく、古文単語・日本史・倫理など<b>他科目の暗記帳</b>も作れます。出題形式は単語と同じ（カード／4択・SRS・苦手ループ）。</p>

      {msg && (
        <div style={{ background: C.dark, color: C.white, fontSize: 13, fontWeight: 700, borderRadius: 12, padding: "12px 16px", marginBottom: 12 }}>{msg}</div>
      )}

      {(mode === "create" || mode === "import") && (
        <Card style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 15, fontWeight: 800, marginBottom: 10 }}>{mode === "create" ? "新しい単語帳" : "単語帳を取り込む"}</div>
          <input value={name} onChange={(e) => setName(e.target.value)} placeholder="単語帳の名前" style={{ width: "100%", fontSize: 14, padding: "10px 14px", border: `1px solid ${C.line}`, borderRadius: 10, background: C.white, marginBottom: 10 }} />
          {mode === "import" && (
            <>
              <label style={{ display: "inline-flex", alignItems: "center", gap: 6, fontFamily: F, fontWeight: 700, fontSize: 13, padding: "8px 14px", borderRadius: 999, border: `1px solid ${C.line}`, background: C.white, color: C.ink, cursor: "pointer", marginBottom: 10 }}>
                <Download size={14} />CSV / TSV / TXT ファイルを選ぶ
                <input type="file" accept=".csv,.tsv,.txt,text/csv,text/tab-separated-values,text/plain,text/*" style={{ display: "none" }} onChange={(e) => { if (e.target.files[0]) readFile(e.target.files[0]); e.target.value = ""; }} />
              </label>

/* ---------- deck detail ---------- */
const CAT_COLOR = { 習得: "#2E7D4F", 定着中: "#C08A1E", 学習中: "#BC4E28", 苦手: "#C13B6B", 未学習: "#B8AF9C" };
function catOf(c) {
  if (!c.seen) return "未学習";
  const lv = c.level || 0;
  if (lv === 0) return "苦手";
  if (lv === 1) return "学習中";
  if (lv === 2) return "定着中";
  return "習得";
}
function chaptersOf(deck) {
  const ch = [];
  for (let s = 0; s < deck.cards.length; s += 100) ch.push({ start: s, end: Math.min(s + 100, deck.cards.length) });
  return ch;
}
let __voice = null;
function pickVoice() {
  try {
    const vs = window.speechSynthesis.getVoices() || [];
    __voice =
      vs.find((v) => /en[-_]US/i.test(v.lang) && /google/i.test(v.name)) ||
      vs.find((v) => /en[-_]US/i.test(v.lang) && v.localService) ||
      vs.find((v) => /en[-_]US/i.test(v.lang)) ||
      vs.find((v) => /^en/i.test(v.lang)) || null;
  } catch {}
}
try { pickVoice(); window.speechSynthesis.onvoiceschanged = pickVoice; } catch {}
function speakEn(text) {
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    u.rate = 0.92;
    u.pitch = 1;
    u.volume = 1; // 最大音量
    if (__voice) u.voice = __voice;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  } catch {}
}
function buzz(ms) { try { if (navigator.vibrate) navigator.vibrate(ms); } catch {} }
function speakJa(text) {
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ja-JP";
    u.rate = 1;
    u.pitch = 1;
    u.volume = 1;
    const vs = window.speechSynthesis.getVoices() || [];
    const v = vs.find((x) => /ja/i.test(x.lang));
    if (v) u.voice = v;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  } catch {}
}
function shuffleArr(a) {
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

function DeckScreen({ deck, update, onBack, onReview, onWeakLoop }) {

  const [setupScope, setSetupScope] = useState(null); // null | "all" | chapter index
  const [session, setSession] = useState(null);
  // list states
  const [copied, setCopied] = useState(false);
  const [showExport, setShowExport] = useState(false);
  const [confirmDel, setConfirmDel] = useState(false);
  const [w, setW] = useState("");
  const [mn, setMn] = useState("");
  const [ex, setEx] = useState("");
  const [q, setQ] = useState("");
  const [limit, setLimit] = useState(50);
  const [catF, setCatF] = useState("すべて");
  const [scanning, setScanning] = useState(false);

  const gradeCard = (realIdx, ok) => update((d) => {
    const c = d.decks.find((x) => x.id === deck.id).cards[realIdx];
    if (!c) return d;
    c.seen = true;
    if (ok) { c.level = Math.min((c.level || 0) + 1, 5); c.due = addDays(todayStr(), SRS_INTERVALS[Math.min(c.level, SRS_INTERVALS.length - 1)]); }
    else { c.level = 0; c.due = addDays(todayStr(), 1); }
    return d;
  });

  if (session) {
    return <StudySession deck={deck} session={session} setSession={setSession} gradeCard={gradeCard} onExit={() => setSession(null)} />;
  }
  if (setupScope !== null) {
    return <SessionSetup deck={deck} scope={setupScope} onBack={() => setSetupScope(null)}
      onStart={(sess) => {
        update((d) => { d.decks.find((x) => x.id === deck.id).lastScope = setupScope; return d; });
        setSession(sess);
      }} />;
  }

  const chapters = chaptersOf(deck);
  const due = deck.cards.filter((c) => (c.due || todayStr()) <= todayStr()).length;
  const tsv = deck.cards.map((c) => `${c.word}\t${c.meaning}${c.example ? " / " + c.example : ""}`).join("\n");
  const copy = async () => {
    try { await navigator.clipboard.writeText(tsv); setCopied(true); setTimeout(() => setCopied(false), 2000); }
    catch { setShowExport(true); }
  };
  const addCard = () => {
    if (!w.trim() || !mn.trim()) return;
    update((d) => {
      d.decks.find((x) => x.id === deck.id).cards.unshift({ word: w.trim(), meaning: mn.trim(), example: ex.trim(), pos: "", tag: "", level: 0, due: todayStr() });
      return d;
    });
    setW(""); setMn(""); setEx("");
  };
  const removeCard = (realIdx) => update((d) => { d.decks.find((x) => x.id === deck.id).cards.splice(realIdx, 1); return d; });

  const lastScope = deck.lastScope;

  const ql = q.trim().toLowerCase();

  const shown = filtered.slice(0, limit);

  return (

        <button onClick={() => {
          if (!confirmDel) { setConfirmDel(true); setTimeout(() => setConfirmDel(false), 2500); }
